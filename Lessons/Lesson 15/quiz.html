<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomenclature of Alcohols</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f0fdfa;
            /* خلفية سماوية فاتحة جداً (مائي) */
        }

        .en-text {
            font-family: 'Roboto', sans-serif;
            direction: ltr;
            text-align: left;
        }

        .option-btn {
            transition: all 0.3s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-gradient {
            background: linear-gradient(135deg, #0284c7 0%, #0891b2 100%);
        }
    </style>
</head>

<body class="min-h-screen py-10 px-4 flex justify-center items-center">

    <div class="max-w-3xl w-full">
        <!-- قسم رأس الاختبار -->
        <div class="text-center mb-8">
            <h1
                class="text-3xl md:text-4xl font-bold text-cyan-800 mb-2 en-text text-center flex justify-center items-center gap-3">
                <i class="fa-solid fa-droplet text-cyan-600"></i>
                Nomenclature of Alcohols
            </h1>
            <p class="text-gray-600 font-semibold text-lg mt-3">تغطية شاملة للصفحات (149 - 155): IUPAC Rules, Common
                Names & Classification</p>
        </div>

        <!-- حاوية الاختبار -->
        <div id="quiz-container" class="bg-white rounded-2xl shadow-xl overflow-hidden fade-in border border-cyan-200">
            <!-- شريط التقدم -->
            <div class="bg-gray-200 h-2 w-full">
                <div id="progress-bar" class="theme-gradient h-2 transition-all duration-500" style="width: 0%;"></div>
            </div>

            <div class="p-6 md:p-8">
                <!-- معلومات السؤال الحالي -->
                <div class="flex justify-between items-center border-b border-cyan-100 pb-4 mb-6">
                    <span id="question-type"
                        class="bg-cyan-100 text-cyan-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">
                        Multiple Choice
                    </span>
                    <span class="text-gray-500 font-semibold text-sm border px-3 py-1 rounded-md bg-gray-50">
                        السؤال <span id="current-q-num">1</span> من <span id="total-q-num">20</span>
                    </span>
                </div>

                <!-- نص السؤال -->
                <h2 id="question-text"
                    class="en-text text-xl md:text-2xl font-bold text-slate-800 mb-6 leading-relaxed">
                    Loading question...
                </h2>

                <!-- تعليمات إضافية (لأسئلة الفراغات والتوصيل) -->
                <div id="extra-instructions"
                    class="en-text hidden mb-6 p-4 bg-sky-50 border-l-4 border-sky-500 rounded-r text-slate-800 text-sm shadow-sm">
                </div>

                <!-- الخيارات -->
                <div id="options-container" class="en-text space-y-3 mb-8">
                </div>

                <!-- صندوق التغذية الراجعة (يظهر بعد الإجابة) -->
                <div id="feedback-box" class="en-text hidden p-5 rounded-xl border mt-6 fade-in shadow-inner">
                    <div class="flex items-start gap-4">
                        <div id="feedback-icon" class="mt-1 text-2xl"></div>
                        <div class="w-full">
                            <h3 id="feedback-title" class="font-bold text-lg mb-1"></h3>
                            <div class="text-sm leading-relaxed mt-2 p-3 rounded-lg" id="feedback-content-bg">
                                <span id="feedback-explanation" class="font-medium block"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ذيل الحاوية (الأزرار) -->
            <div class="bg-slate-50 p-5 border-t border-gray-100 flex justify-between items-center">
                <div id="score-display" class="font-bold text-cyan-700 hidden text-lg flex items-center gap-2">
                    <i class="fa-solid fa-star text-cyan-500"></i> النتيجة: <span id="current-score"
                        class="text-xl">0</span>
                </div>
                <div></div> <!-- Spacer -->
                <button id="next-btn"
                    class="hidden theme-gradient hover:opacity-90 text-white font-bold py-2 px-6 rounded-lg transition-opacity flex items-center gap-2 shadow-md"
                    onclick="nextQuestion()">
                    <span id="btn-text">التالي</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </div>
        </div>

        <!-- حاوية النتيجة النهائية -->
        <div id="result-container"
            class="hidden bg-white p-8 rounded-2xl shadow-xl text-center fade-in max-w-lg mx-auto mt-10 border border-cyan-200">
            <i class="fa-solid fa-glass-water text-7xl text-cyan-600 mb-6 drop-shadow-md"></i>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">اكتمل الاختبار!</h2>
            <p class="text-gray-600 mb-6 font-medium">لقد أنهيت تقييم تسمية الكحولات وتصنيفاتها بنجاح.</p>

            <div class="bg-cyan-50 border border-cyan-200 rounded-xl p-6 mb-8 shadow-inner">
                <div class="text-6xl font-black text-cyan-700 en-text text-center">
                    <span id="final-score">0</span> <span class="text-3xl text-cyan-500">/ 20</span>
                </div>
                <p id="result-message" class="text-base text-cyan-800 mt-4 font-bold"></p>
            </div>

            <button onclick="restartQuiz()"
                class="w-full theme-gradient hover:opacity-90 text-white font-bold py-4 px-6 rounded-xl transition-opacity flex justify-center items-center gap-3 text-lg shadow-lg">
                <i class="fa-solid fa-rotate-right"></i>
                إعادة الاختبار
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            // --- Multiple Choice (1-5) ---
            {
                type: "Multiple Choice",
                q: "What is the specific IUPAC suffix used to denote the presence of an alcohol functional group?",
                options: ["-al", "-oic acid", "-one", "-ol"],
                a: "-ol",
                exp: "In IUPAC nomenclature, the principal functional group determines the suffix. For alcohols, the '-e' ending of the parent alkane is dropped and '-ol' is added (e.g., methane → methanol)."
            },
            {
                type: "Multiple Choice",
                q: "According to IUPAC rules, how is the parent carbon chain of an alcohol selected and numbered?",
                options: ["Find the longest carbon chain, number it from left to right.", "Find the longest carbon chain containing the -OH group, and number to give the -OH the lowest possible number.", "Number the chain to give the alkyl substituents the lowest possible numbers.", "Number alphabetically based on substituents."],
                a: "Find the longest carbon chain containing the -OH group, and number to give the -OH the lowest possible number.",
                exp: "The principal functional group (-OH) has priority. The parent chain MUST contain the carbon bonded to the -OH, and numbering must start from the end that gives this carbon the lowest locant."
            },
            {
                type: "Multiple Choice",
                q: "What is the correct IUPAC name for the structure CH₃-CH(OH)-CH₂-CH₃?",
                options: ["2-Butanol (or Butan-2-ol)", "3-Butanol", "1-Butanol", "Butyl alcohol"],
                a: "2-Butanol (or Butan-2-ol)",
                exp: "The longest chain is 4 carbons (butane). Numbering from the left gives the -OH group position 2. Numbering from the right gives 3. The lower number (2) is correct."
            },
            {
                type: "Multiple Choice",
                q: "How are alcohols that contain exactly two hydroxyl (-OH) groups named in the IUPAC system?",
                options: ["As -diols", "As -triols", "As -glycols", "As -diones"],
                a: "As -diols",
                exp: "When two hydroxyl groups are present, the full alkane name is retained (the 'e' is not dropped), and the suffix '-diol' is added (e.g., ethane-1,2-diol)."
            },
            {
                type: "Multiple Choice",
                q: "What is the accepted common name for 2-propanol (CH₃-CH(OH)-CH₃)?",
                options: ["Propyl alcohol", "Isopropyl alcohol", "Sec-butyl alcohol", "Isobutyl alcohol"],
                a: "Isopropyl alcohol",
                exp: "The IUPAC name is 2-propanol. Its common name is formed by naming the alkyl group attached to the -OH, which in this case is the branched 'isopropyl' group."
            },

            // --- True / False (6-10) ---
            {
                type: "True / False",
                q: "When naming an alcohol, the parent chain must be the absolute longest continuous carbon chain in the molecule, regardless of whether it contains the -OH group.",
                options: ["True", "False"],
                a: "False",
                exp: "False. The fundamental rule is that the parent chain MUST include the carbon atom bonded directly to the hydroxyl (-OH) group, even if there is a longer chain that doesn't."
            },
            {
                type: "True / False",
                q: "In a cyclic alcohol (like cyclopentanol), the carbon atom attached to the hydroxyl group is automatically assigned position number 1.",
                options: ["True", "False"],
                a: "True",
                exp: "True. Because the -OH group defines the principal functional group of the ring, it dictates the numbering. The '1-' is usually omitted from the name (e.g., cyclopentanol, not 1-cyclopentanol)."
            },
            {
                type: "True / False",
                q: "If a molecule contains both a carbon-carbon double bond (C=C) and a hydroxyl group (-OH), the double bond receives priority for lower numbering.",
                options: ["True", "False"],
                a: "False",
                exp: "False. The hydroxyl group (-OH) has a higher nomenclature priority than double or triple bonds. Therefore, the chain is numbered to give the -OH the lowest possible number."
            },
            {
                type: "True / False",
                q: "Phenol is the universally accepted IUPAC name for an aromatic benzene ring with a single hydroxyl (-OH) group directly attached to it.",
                options: ["True", "False"],
                a: "True",
                exp: "True. While its systematic name is hydroxybenzene, the name 'Phenol' is fully accepted by IUPAC and serves as the parent name for its derivatives."
            },
            {
                type: "True / False",
                q: "A tertiary (3°) alcohol has its hydroxyl group attached to a carbon atom that is bonded to exactly three other carbon atoms.",
                options: ["True", "False"],
                a: "True",
                exp: "True. The classification of an alcohol (1°, 2°, 3°) is entirely based on the degree of the carbon atom bonded to the -OH group."
            },

            // --- Fill in the Blanks (11-15) ---
            {
                type: "Fill in the Blank",
                q: "The -OH functional group is chemically referred to as the ________ group.",
                options: ["Glycol", "Glycerol", "Phenol", "Hydroxyl", "Suffix"],
                a: "Hydroxyl",
                exp: "The hydroxyl group (-OH) is highly polar and forms strong hydrogen bonds, dominating the physical properties of alcohols."
            },
            {
                type: "Fill in the Blank",
                q: "When naming alcohols according to IUPAC rules, the 'e' ending of the parent alkane is replaced by the ________ '-ol'.",
                options: ["Glycol", "Glycerol", "Phenol", "Hydroxyl", "Suffix"],
                a: "Suffix",
                exp: "The suffix is the end of the chemical name that explicitly defines the principal functional group present in the molecule."
            },
            {
                type: "Fill in the Blank",
                q: "An alcohol containing two -OH groups located on adjacent carbon atoms is commonly referred to as a ________.",
                options: ["Glycol", "Glycerol", "Phenol", "Hydroxyl", "Suffix"],
                a: "Glycol",
                exp: "Vicinal diols (like ethane-1,2-diol) are almost universally called glycols (e.g., ethylene glycol, which is widely used as antifreeze)."
            },
            {
                type: "Fill in the Blank",
                q: "1,2,3-propanetriol, a non-toxic, viscous liquid widely used in cosmetics, food, and as a backbone of fats, is known by its common name ________.",
                options: ["Glycol", "Glycerol", "Phenol", "Hydroxyl", "Suffix"],
                a: "Glycerol",
                exp: "Glycerol (also called glycerin) is a triol that forms the structural backbone of triglycerides (fats and oils)."
            },
            {
                type: "Fill in the Blank",
                q: "An aromatic compound where the -OH group is directly attached to an sp² hybridized carbon of a benzene ring is called ________.",
                options: ["Glycol", "Glycerol", "Phenol", "Hydroxyl", "Suffix"],
                a: "Phenol",
                exp: "Phenols are a distinct class of compounds from aliphatic alcohols because the aromatic ring significantly increases the acidity of the hydroxyl hydrogen."
            },

            // --- Matching (16-20) ---
            {
                type: "Matching",
                q: "Match the chemical name to its correct description/common name: \nMethanol (CH₃OH)",
                options: ["Wood alcohol", "Grain alcohol", "Ethylene glycol", "Cyclic secondary alcohol", "Tertiary (3°) alcohol"],
                a: "Wood alcohol",
                exp: "Methanol is commonly called wood alcohol because it was historically produced by the destructive distillation of wood. It is highly toxic."
            },
            {
                type: "Matching",
                q: "Match the chemical name to its correct description/common name: \nEthanol (CH₃CH₂OH)",
                options: ["Wood alcohol", "Grain alcohol", "Ethylene glycol", "Cyclic secondary alcohol", "Tertiary (3°) alcohol"],
                a: "Grain alcohol",
                exp: "Ethanol is known as grain alcohol because it is produced by the fermentation of sugars and starches found in grains."
            },
            {
                type: "Matching",
                q: "Match the chemical name to its correct description/common name: \n1,2-Ethanediol (HO-CH₂-CH₂-OH)",
                options: ["Wood alcohol", "Grain alcohol", "Ethylene glycol", "Cyclic secondary alcohol", "Tertiary (3°) alcohol"],
                a: "Ethylene glycol",
                exp: "This is the most common diol, widely utilized as automotive antifreeze due to its ability to lower the freezing point of water."
            },
            {
                type: "Matching",
                q: "Match the chemical name to its correct description/common name: \nCyclohexanol",
                options: ["Wood alcohol", "Grain alcohol", "Ethylene glycol", "Cyclic secondary alcohol", "Tertiary (3°) alcohol"],
                a: "Cyclic secondary alcohol",
                exp: "The -OH is attached to a carbon within a 6-membered ring. That ring carbon is bonded to two other carbons, making it secondary."
            },
            {
                type: "Matching",
                q: "Match the chemical name to its correct description/common name: \n2-Methyl-2-propanol",
                options: ["Wood alcohol", "Grain alcohol", "Ethylene glycol", "Cyclic secondary alcohol", "Tertiary (3°) alcohol"],
                a: "Tertiary (3°) alcohol",
                exp: "Commonly known as tert-butyl alcohol. The central carbon bearing the -OH is also bonded to three methyl (-CH₃) groups."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let hasAnswered = false;

        const elQuestionText = document.getElementById('question-text');
        const elOptionsContainer = document.getElementById('options-container');
        const elCurrentQNum = document.getElementById('current-q-num');
        const elTotalQNum = document.getElementById('total-q-num');
        const elProgressBar = document.getElementById('progress-bar');
        const elQuestionType = document.getElementById('question-type');
        const elNextBtn = document.getElementById('next-btn');
        const elFeedbackBox = document.getElementById('feedback-box');
        const elFeedbackIcon = document.getElementById('feedback-icon');
        const elFeedbackTitle = document.getElementById('feedback-title');
        const elFeedbackContentBg = document.getElementById('feedback-content-bg');
        const elFeedbackExplanation = document.getElementById('feedback-explanation');
        const elScoreDisplay = document.getElementById('score-display');
        const elCurrentScore = document.getElementById('current-score');
        const elExtraInstructions = document.getElementById('extra-instructions');
        const elQuizContainer = document.getElementById('quiz-container');
        const elResultContainer = document.getElementById('result-container');
        const elBtnText = document.getElementById('btn-text');

        function initQuiz() {
            elTotalQNum.textContent = quizData.length;
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            const q = quizData[currentIdx];

            elCurrentQNum.textContent = currentIdx + 1;
            elProgressBar.style.width = `${((currentIdx) / quizData.length) * 100}%`;
            elQuestionType.textContent = q.type;
            elQuestionText.innerText = q.q;

            if (q.type === "Fill in the Blank") {
                elExtraInstructions.innerHTML = "<strong class='text-sky-800'><i class='fa-solid fa-layer-group mr-2'></i> Word Bank:</strong> Glycol, Glycerol, Phenol, Hydroxyl, Suffix";
                elExtraInstructions.classList.remove('hidden');
            } else if (q.type === "Matching") {
                elExtraInstructions.innerHTML = "<strong class='text-sky-800'><i class='fa-solid fa-link mr-2'></i> Select the correct match from List B:</strong> Wood alcohol, Grain alcohol, Ethylene glycol, Cyclic secondary alcohol, Tertiary (3°) alcohol";
                elExtraInstructions.classList.remove('hidden');
            } else {
                elExtraInstructions.classList.add('hidden');
            }

            elFeedbackBox.classList.add('hidden');
            elNextBtn.classList.add('hidden');
            elScoreDisplay.classList.remove('hidden');
            elCurrentScore.textContent = score;

            elOptionsContainer.innerHTML = '';
            q.options.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left bg-white border-2 border-slate-200 rounded-xl p-4 text-slate-700 font-bold hover:border-cyan-500 hover:bg-cyan-50 flex justify-between items-center";

                const spanText = document.createElement('span');
                spanText.textContent = option;
                btn.appendChild(spanText);

                const iconSpan = document.createElement('span');
                iconSpan.className = "icon-placeholder";
                btn.appendChild(iconSpan);

                btn.onclick = () => checkAnswer(option, btn);
                elOptionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOption, btnElement) {
            if (hasAnswered) return;
            hasAnswered = true;

            const q = quizData[currentIdx];
            const isCorrect = (selectedOption === q.a);
            const allBtns = elOptionsContainer.querySelectorAll('button');

            allBtns.forEach(btn => {
                btn.disabled = true;
                const btnText = btn.querySelector('span').textContent;
                const iconContainer = btn.querySelector('.icon-placeholder');

                if (btnText === q.a) {
                    btn.classList.remove('border-slate-200', 'hover:border-cyan-500', 'hover:bg-cyan-50', 'text-slate-700');
                    btn.classList.add('border-green-500', 'bg-green-50', 'text-green-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-2xl"></i>';
                } else if (btnText === selectedOption && !isCorrect) {
                    btn.classList.remove('border-slate-200', 'hover:border-cyan-500', 'hover:bg-cyan-50', 'text-slate-700');
                    btn.classList.add('border-red-500', 'bg-red-50', 'text-red-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-2xl"></i>';
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            elFeedbackBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');

            if (isCorrect) {
                score++;
                elCurrentScore.textContent = score;
                elFeedbackBox.classList.add('bg-green-50', 'border-green-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-shield-check text-green-600"></i>';
                elFeedbackTitle.textContent = "✔️ إجابة صحيحة!";
                elFeedbackTitle.className = "font-extrabold text-xl mb-1 text-green-800";

                elFeedbackContentBg.className = "text-sm leading-relaxed mt-2 p-3 rounded-lg bg-green-100 text-green-900";
                elFeedbackExplanation.innerHTML = `<strong>التوضيح العلمي:</strong> ${q.exp}`;
            } else {
                elFeedbackBox.classList.add('bg-red-50', 'border-red-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-600"></i>';
                elFeedbackTitle.textContent = "❌ إجابة خاطئة";
                elFeedbackTitle.className = "font-extrabold text-xl mb-1 text-red-800";

                elFeedbackContentBg.className = "text-sm leading-relaxed mt-2 p-4 rounded-lg bg-red-100 text-red-900 border border-red-200";
                elFeedbackExplanation.innerHTML = `
                    <div class="mb-3 border-b border-red-200 pb-2">
                        لقد اخترت: <span class="line-through opacity-75">${selectedOption}</span><br>
                        الخيار الصحيح هو: <strong class="bg-white px-2 py-1 rounded text-red-700 shadow-sm ml-1 inline-block mt-1">${q.a}</strong>
                    </div>
                    <strong>لماذا الخيار الصحيح أفضل؟</strong><br> ${q.exp}
                `;
            }

            if (currentIdx === quizData.length - 1) {
                elBtnText.textContent = "عرض النتيجة النهائية";
                elNextBtn.classList.add('px-8', 'py-3', 'text-lg');
            } else {
                elBtnText.textContent = "التالي";
            }
            elNextBtn.classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            elProgressBar.style.width = `100%`;
            elQuizContainer.classList.add('hidden');
            elResultContainer.classList.remove('hidden');

            document.getElementById('final-score').textContent = score;

            const msgEl = document.getElementById('result-message');
            if (score >= 18) {
                msgEl.textContent = "أداء كيميائي مثالي! 🌟 فهمك لقواعد التسمية والأولويات صلب جداً.";
            } else if (score >= 13) {
                msgEl.textContent = "عمل رائع! 👏 بقليل من التركيز على قواعد الأولويات (Priority) ستصل للكمال.";
            } else {
                msgEl.textContent = "قواعد (IUPAC) تحتاج للتدريب المستمر. راجع التفسيرات وأعد المحاولة! 💡";
            }
        }

        function restartQuiz() {
            currentIdx = 0;
            score = 0;
            elResultContainer.classList.add('hidden');
            elQuizContainer.classList.remove('hidden');
            elNextBtn.classList.remove('px-8', 'py-3', 'text-lg');
            loadQuestion();
        }

        // Start Quiz
        initQuiz();

    </script>
</body>

</html>

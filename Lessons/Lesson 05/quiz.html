<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الكيمياء العضوية 106 - الفصل الخامس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* إضافة خط عربي جميل لتحسين المظهر */
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8">
    
    <div class="max-w-4xl mx-auto" id="app-container">
        
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 mb-8 text-center relative">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">اختبار الكيمياء العضوية 106</h1>
            <p class="text-gray-500">الفصل الخامس: الألكينات والألكاينات</p>
            <p class="text-sm text-gray-400 mt-1" dir="ltr">(Alkene and Alkyne)</p>
            
            <!-- Result Container (Hidden by default) -->
            <div id="result-container" class="hidden mt-6 p-6 bg-blue-50 rounded-xl border border-blue-100 flex-col items-center justify-center transition-all duration-500">
                <svg class="w-12 h-12 text-blue-500 mb-2 mx-auto" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                <h2 class="text-2xl font-bold text-blue-900 mb-1 text-center">النتيجة النهائية</h2>
                <p id="final-score" class="text-3xl font-black text-blue-600 mb-4 text-center">0 / 20</p>
                <button onclick="resetQuiz()" class="mx-auto flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full transition-colors font-medium shadow-md">
                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></svg>
                    إعادة الاختبار
                </button>
            </div>
        </div>

        <div class="space-y-8" id="quiz-sections">
            <!-- Sections will be generated here by JavaScript -->
        </div>

        <!-- Action Button -->
        <div class="mt-10 text-center pb-12" id="submit-btn-container">
            <button onclick="calculateScore()" class="bg-gray-800 hover:bg-gray-900 text-white text-xl font-bold py-4 px-12 rounded-full shadow-xl transition-transform hover:scale-105 active:scale-95">
                تقديم الإجابات وتقييم الاختبار
            </button>
        </div>

    </div>

    <script>
        // --- Data Definitions ---
        const quizData = {
            mcq: [
                { id: 'q1', q: "What is the general molecular formula for alkynes?", options: [{ text: "CnH2n+2", label: "C<sub>n</sub>H<sub>2n+2</sub>" }, { text: "CnH2n", label: "C<sub>n</sub>H<sub>2n</sub>" }, { text: "CnH2n-2", label: "C<sub>n</sub>H<sub>2n-2</sub>" }, { text: "CnHn", label: "C<sub>n</sub>H<sub>n</sub>" }], correct: "CnH2n-2", explanation: "Alkynes contain at least one carbon-carbon triple bond and fit the general formula C<sub>n</sub>H<sub>2n-2</sub>. Alkenes fit C<sub>n</sub>H<sub>2n</sub>." },
                { id: 'q2', q: "What is the hybridization and bond angle of the carbon atoms in ethyne (acetylene, H-C&equiv;C-H)?", options: [{ text: "sp3_109", label: "<i>sp<sup>3</sup></i> hybridized, 109.5°" }, { text: "sp2_120", label: "<i>sp<sup>2</sup></i> hybridized, 120°" }, { text: "sp_180", label: "<i>sp</i> hybridized, 180°" }, { text: "unhybridized", label: "Unhybridized, 90°" }], correct: "sp_180", explanation: "Each carbon of the triple bond is <i>sp</i> hybridized, resulting in a linear geometry and bond angles of exactly 180°." },
                { id: 'q3', q: "According to Saytzeff's Rule, what is the major product in the acid-catalyzed dehydration of an alcohol?", options: [{ text: "least_substituted", label: "The least substituted alkene" }, { text: "most_substituted", label: "The most highly substituted alkene" }, { text: "alkyne", label: "An alkyne" }, { text: "cycloalkane", label: "A cycloalkane" }], correct: "most_substituted", explanation: "Saytzeff's Rule states that in elimination reactions, the major product is always the alkene with the most alkyl substituents attached to the double-bonded carbons." },
                { id: 'q4', q: "When two double bonds in a molecule are separated by exactly one single bond (e.g., C=C-C=C), they are termed as:", options: [{ text: "Cumulated", label: "Cumulated" }, { text: "Conjugated", label: "Conjugated" }, { text: "Isolated", label: "Isolated (non-conjugated)" }, { text: "Aromatic", label: "Aromatic" }], correct: "Conjugated", explanation: "Multiple bonds are said to be conjugated if they perfectly alternate with single bonds. If they are right next to each other, they are cumulated." },
                { id: 'q5', q: "Which reagents are typically used for the dehydrohalogenation of alkyl halides to yield an alkene?", options: [{ text: "Zn_AcOH", label: "Zn / AcOH" }, { text: "H2SO4_heat", label: "H<sub>2</sub>SO<sub>4</sub> / heat" }, { text: "KOH_alcohol", label: "KOH or NaOH in alcohol / heat" }, { text: "NaNH2", label: "NaNH<sub>2</sub> / NH<sub>3</sub>" }], correct: "KOH_alcohol", explanation: "Heating an alkyl halide with a strong base like NaOH or KOH in alcohol eliminates HX to yield an alkene (dehydrohalogenation)." }
            ],
            tf: [
                { id: 'q6', q: "Alkenes and alkynes are classified as saturated hydrocarbons.", correct: "False", explanation: "False. They are <b>unsaturated</b> hydrocarbons because they possess multiple bonds (double or triple) and can undergo addition reactions with hydrogen atoms." },
                { id: 'q7', q: "Cis-trans isomers of alkenes can easily interconvert by free rotation around the carbon-carbon double bond at room temperature.", correct: "False", explanation: "False. Rotation at carbon-carbon double bonds is restricted because of the &pi; bond. Interconversion requires sufficient energy (like light or high heat) to break the &pi; bond." },
                { id: 'q8', q: "The dehydration of alcohols in the presence of an acid catalyst proceeds via a carbocation intermediate.", correct: "True", explanation: "True. The reaction involves a carbocation intermediate, and its ease of formation and stability strictly follows the order 3° &gt; 2° &gt; 1°." },
                { id: 'q9', q: "A terminal alkyne has its triple bond at the end of the carbon chain, meaning a hydrogen atom is directly bonded to an <i>sp</i> carbon of the triple bond.", correct: "True", explanation: "True. Terminal alkynes have a structure like R-C&equiv;C-H, whereas internal alkynes have carbon atoms bonded on both sides (R-C&equiv;C-R')." },
                { id: 'q10', q: "The vinyl group is commonly used in nomenclature, and its systematic IUPAC name is the ethenyl group (CH<sub>2</sub>=CH-).", correct: "True", explanation: "True. Vinyl (CH<sub>2</sub>=CH-) and allyl (CH<sub>2</sub>=CH-CH<sub>2</sub>-) are important common names derived from ethene and propene." }
            ],
            fill: [
                { id: 'q11', part1: "", part2: " is an addition reaction which allows us to obtain alkanes from alkenes or alkynes by adding H<sub>2</sub> in the presence of a catalyst.", accepted: "Hydrogenation", explanation: "Hydrogenation is the process of adding hydrogen gas across a multiple bond to saturate it." },
                { id: 'q12', part1: "A ", part2: " dihalide has two halogen atoms bonded to <i>adjacent</i> carbon atoms, which can be dehalogenated (using Zn) to form an alkene.", accepted: "vicinal", explanation: "Vicinal dibromides have halogens on adjacent carbons, while geminal dihalides have them on the same carbon atom." },
                { id: 'q13', part1: "The predominant alkene formed during the dehydration of an alcohol follows ", part2: " rule, which favors the most highly substituted alkene.", accepted: "Saytzeff's", explanation: "Saytzeff's (or Zaitsev's) rule states the major product is the alkene with the most alkyl groups attached to the C=C bond." },
                { id: 'q14', part1: "The ease of formation and stabilities of ", part2: " follow the order 3° &gt; 2° &gt; 1° during the dehydration mechanism of alcohols.", accepted: "carbocations", explanation: "A carbocation intermediate is formed after water leaves, and tertiary (3°) carbocations are the most stable." },
                { id: 'q15', part1: "Ethyne (H-C&equiv;C-H) is widely and commonly known as ", part2: ", a gas which is used in high-temperature cutting and welding torches.", accepted: "acetylene", explanation: "Acetylene is the common, historically entrenched name for ethyne." }
            ],
            match: [
                { id: 'q16', term: "Allyl group", correctMatch: "A substituent with the structure -CH₂-CH=CH₂ (2-propenyl)." },
                { id: 'q17', term: "Cumulated double bonds", correctMatch: "Double bonds that are located right next to one another in a molecule (C=C=C)." },
                { id: 'q18', term: "Dehalogenation", correctMatch: "An elimination reaction using Zn/AcOH on a vicinal dibromide to yield an alkene." },
                { id: 'q19', term: "Geminal dihalide", correctMatch: "A compound with two halogen atoms bonded to the same carbon atom." },
                { id: 'q20', term: "Polyenes", correctMatch: "Compounds with many double bonds, such as lycopene and β-carotene." }
            ],
            matchOptions: [
                "A compound with two halogen atoms bonded to the same carbon atom.",
                "A substituent with the structure -CH₂-CH=CH₂ (2-propenyl).",
                "Double bonds that are located right next to one another in a molecule (C=C=C).",
                "Compounds with many double bonds, such as lycopene and β-carotene.",
                "An elimination reaction using Zn/AcOH on a vicinal dibromide to yield an alkene."
            ]
        };

        const fillWordBank = ["Hydrogenation", "vicinal", "Saytzeff's", "carbocations", "acetylene"];

        // --- Icons ---
        const icons = {
            check: '<svg class="w-5 h-5 flex-shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            cross: '<svg class="w-5 h-5 flex-shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
            alert: '<svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
        };

        // --- State ---
        let answers = {};
        let submitted = false;

        // --- Render Functions ---
        function renderQuiz() {
            const container = document.getElementById('quiz-sections');
            container.innerHTML = '';

            // Section 1: MCQ
            let mcqHTML = `
                <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-blue-600 text-white px-6 py-4">
                        <h2 class="text-xl font-bold">الجزء الأول: اختيار من متعدد (Multiple Choice)</h2>
                    </div>
                    <div class="p-6 space-y-8">
            `;
            quizData.mcq.forEach((q, index) => {
                mcqHTML += `
                    <div class="border-b border-gray-100 pb-6 last:border-0 last:pb-0" id="container-${q.id}">
                        <div class="font-medium text-lg text-gray-800 mb-4 leading-relaxed" dir="ltr">
                            <span class="text-blue-600 font-bold mr-2">${index + 1}.</span>${q.q}
                        </div>
                        <div class="grid grid-cols-1 gap-3" dir="ltr">
                            ${q.options.map((opt, optIndex) => `
                                <label id="label-${q.id}-${optIndex}" class="flex items-center p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition-colors">
                                    <input type="radio" name="${q.id}" value="${opt.text}" class="hidden" onchange="handleRadioChange('${q.id}', '${opt.text}', ${optIndex}, 'mcq')">
                                    <div id="icon-${q.id}-${optIndex}" class="w-7 h-7 rounded-md flex items-center justify-center mr-3 font-bold text-sm shadow-sm transition-colors bg-gray-100 text-gray-600 border border-gray-300">
                                        ${String.fromCharCode(97 + optIndex)}
                                    </div>
                                    <span class="text-gray-700 text-lg">${opt.label}</span>
                                </label>
                            `).join('')}
                        </div>
                        <div id="feedback-${q.id}"></div>
                    </div>
                `;
            });
            mcqHTML += `</div></section>`;

            // Section 2: TF
            let tfHTML = `
                <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-teal-600 text-white px-6 py-4">
                        <h2 class="text-xl font-bold">الجزء الثاني: صح أم خطأ (True / False)</h2>
                    </div>
                    <div class="p-6 space-y-8">
            `;
            quizData.tf.forEach((q, index) => {
                tfHTML += `
                    <div class="border-b border-gray-100 pb-6 last:border-0 last:pb-0" id="container-${q.id}">
                        <div class="font-medium text-lg text-gray-800 mb-4 leading-relaxed" dir="ltr">
                            <span class="text-teal-600 font-bold mr-2">${index + 6}.</span>${q.q}
                        </div>
                        <div class="flex gap-4" dir="ltr">
                            ${['True', 'False'].map((opt, optIndex) => `
                                <label id="label-${q.id}-${optIndex}" class="flex items-center px-6 py-3 rounded-xl border border-gray-200 hover:bg-gray-50 cursor-pointer transition-all flex-1 justify-center">
                                    <input type="radio" name="${q.id}" value="${opt}" class="hidden" onchange="handleRadioChange('${q.id}', '${opt}', ${optIndex}, 'tf')">
                                    <span id="text-${q.id}-${optIndex}" class="font-bold text-lg text-gray-600">${opt}</span>
                                </label>
                            `).join('')}
                        </div>
                        <div id="feedback-${q.id}"></div>
                    </div>
                `;
            });
            tfHTML += `</div></section>`;

            // Section 3: Fill
            let fillHTML = `
                <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-purple-600 text-white px-6 py-4">
                        <h2 class="text-xl font-bold">الجزء الثالث: املأ الفراغات (Fill in the blanks)</h2>
                    </div>
                    <div class="p-6 space-y-8">
                        <div class="bg-purple-50 border border-purple-100 rounded-xl p-5 mb-2 shadow-sm">
                            <p class="text-purple-800 font-bold mb-3 flex items-center gap-2">
                                ${icons.alert} صندوق الكلمات (Word Bank) المتاحة للاختيار:
                            </p>
                            <div class="flex flex-wrap gap-2" dir="ltr">
                                ${fillWordBank.map(word => `<span class="bg-white border border-purple-200 text-purple-700 px-4 py-1.5 rounded-lg text-sm font-bold shadow-sm">${word}</span>`).join('')}
                            </div>
                        </div>
            `;
            quizData.fill.forEach((q, index) => {
                fillHTML += `
                    <div class="border-b border-gray-100 pb-6 last:border-0 last:pb-0" id="container-${q.id}">
                        <div class="font-medium text-lg text-gray-800 mb-4 leading-relaxed flex flex-wrap items-center gap-y-2" dir="ltr">
                            <span class="text-purple-600 font-bold mr-2">${index + 11}.</span>
                            <span>${q.part1}</span>
                            <select id="select-${q.id}" class="mx-2 pb-1 border-b-2 border-purple-300 hover:border-purple-500 focus:border-purple-600 outline-none text-center text-purple-700 font-bold min-w-[150px] bg-transparent transition-colors cursor-pointer" dir="ltr" onchange="handleSelectChange('${q.id}', this.value)">
                                <option value="" disabled selected>Select...</option>
                                ${fillWordBank.map(word => `<option value="${word}">${word}</option>`).join('')}
                            </select>
                            <span>${q.part2}</span>
                        </div>
                        <div id="feedback-${q.id}"></div>
                    </div>
                `;
            });
            fillHTML += `</div></section>`;

            // Section 4: Match
            let matchHTML = `
                <section class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-orange-600 text-white px-6 py-4">
                        <h2 class="text-xl font-bold">الجزء الرابع: التوصيل (Matching)</h2>
                    </div>
                    <div class="p-6 space-y-8">
                        <div class="bg-orange-50 border border-orange-100 rounded-lg p-4 mb-6 shadow-sm">
                            <p class="text-orange-800 text-sm flex items-center gap-2 font-medium">
                                ${icons.alert} اختر التعريف المناسب من القائمة المنسدلة لكل مصطلح.
                            </p>
                        </div>
                        <div class="space-y-6">
            `;
            quizData.match.forEach((q, index) => {
                matchHTML += `
                    <div class="flex flex-col md:flex-row md:items-center gap-4 border-b border-gray-100 pb-6 last:border-0 last:pb-0" dir="ltr" id="container-${q.id}">
                        <div class="md:w-1/3 flex-shrink-0">
                            <p class="font-bold text-gray-800 text-lg flex items-center">
                                <span class="text-orange-600 mr-2">${index + 16}.</span>
                                <span class="bg-gray-100 px-3 py-1.5 rounded-lg border border-gray-200 shadow-sm">${q.term}</span>
                            </p>
                        </div>
                        <div class="md:w-2/3">
                            <select id="select-${q.id}" class="w-full p-3 rounded-lg border bg-white border-gray-300 focus:border-orange-500 outline-none transition-colors cursor-pointer shadow-sm" onchange="handleSelectChange('${q.id}', this.value)">
                                <option value="" disabled selected>Select the correct match...</option>
                                ${quizData.matchOptions.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                            </select>
                            <div id="feedback-${q.id}"></div>
                        </div>
                    </div>
                `;
            });
            matchHTML += `</div></div></section>`;

            container.innerHTML = mcqHTML + tfHTML + fillHTML + matchHTML;
        }

        // --- Interaction Logic ---
        function handleRadioChange(qId, value, index, type) {
            if (submitted) return;
            answers[qId] = value;

            if (type === 'mcq') {
                // Reset all in this group
                const qData = quizData.mcq.find(q => q.id === qId);
                qData.options.forEach((_, i) => {
                    const label = document.getElementById(`label-${qId}-${i}`);
                    const icon = document.getElementById(`icon-${qId}-${i}`);
                    label.className = "flex items-center p-3 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer transition-colors";
                    icon.className = "w-7 h-7 rounded-md flex items-center justify-center mr-3 font-bold text-sm shadow-sm transition-colors bg-gray-100 text-gray-600 border border-gray-300";
                });
                // Set active
                const activeLabel = document.getElementById(`label-${qId}-${index}`);
                const activeIcon = document.getElementById(`icon-${qId}-${index}`);
                activeLabel.className = "flex items-center p-3 rounded-lg border cursor-pointer transition-colors border-blue-500 bg-blue-50";
                activeIcon.className = "w-7 h-7 rounded-md flex items-center justify-center mr-3 font-bold text-sm shadow-sm transition-colors bg-blue-600 text-white";
            } else if (type === 'tf') {
                ['True', 'False'].forEach((_, i) => {
                    const label = document.getElementById(`label-${qId}-${i}`);
                    const text = document.getElementById(`text-${qId}-${i}`);
                    label.className = "flex items-center px-6 py-3 rounded-xl border border-gray-200 hover:bg-gray-50 cursor-pointer transition-all flex-1 justify-center";
                    text.className = "font-bold text-lg text-gray-600";
                });
                const activeLabel = document.getElementById(`label-${qId}-${index}`);
                const activeText = document.getElementById(`text-${qId}-${index}`);
                activeLabel.className = "flex items-center px-6 py-3 rounded-xl border cursor-pointer transition-all flex-1 justify-center border-teal-500 bg-teal-50 shadow-sm";
                activeText.className = "font-bold text-lg text-teal-700";
            }
        }

        function handleSelectChange(qId, value) {
            if (submitted) return;
            answers[qId] = value;
        }

        // --- Scoring and Feedback ---
        function calculateScore() {
            if (submitted) return; // Prevent multiple submissions
            
            let currentScore = 0;
            submitted = true;

            // Helper to generate Feedback HTML
            const generateFeedbackBlock = (isCorrect, correctText, explanation) => {
                return `
                    <div class="mt-3 p-4 rounded-lg flex items-start gap-3 ${isCorrect ? 'bg-green-50 text-green-800 border border-green-200' : 'bg-red-50 text-red-800 border border-red-200'}">
                        ${isCorrect ? icons.check : icons.cross}
                        <div class="text-sm w-full" dir="ltr">
                            <p class="font-bold mb-1 text-right" dir="rtl">${isCorrect ? "إجابة صحيحة!" : "إجابة خاطئة"}</p>
                            ${!isCorrect && correctText ? `<p class="mb-2 text-right" dir="rtl"><span class="font-semibold text-gray-700">الإجابة الصحيحة هي:</span> <span dir="ltr" class="font-bold text-blue-700 bg-white px-2 py-0.5 rounded border border-blue-200">${correctText}</span></p>` : ''}
                            ${explanation ? `<div class="bg-white/50 p-3 rounded mt-2 border border-black/5"><span class="font-bold text-gray-900 block mb-1">Explanation:</span>${explanation}</div>` : ''}
                        </div>
                    </div>
                `;
            };

            const generateMatchFeedback = (isCorrect, correctMatch) => {
                return `
                    <div class="mt-3">
                        ${!isCorrect ? `
                            <div class="text-sm bg-red-50 text-red-800 p-3 rounded-lg border border-red-200 text-right" dir="rtl">
                                <p class="font-bold flex items-center gap-1 mb-2">${icons.cross} إجابة خاطئة</p>
                                <p><span class="font-semibold">الإجابة الصحيحة هي:</span> <span dir="ltr" class="block mt-1 p-2 bg-white rounded border border-red-100 font-medium">${correctMatch}</span></p>
                            </div>
                        ` : `
                            <div class="text-sm bg-green-50 text-green-800 p-3 rounded-lg border border-green-200 text-right" dir="rtl">
                                <p class="font-bold flex items-center gap-1">${icons.check} إجابة صحيحة!</p>
                            </div>
                        `}
                    </div>
                `;
            }

            // Grade MCQ
            quizData.mcq.forEach(q => {
                const isCorrect = answers[q.id] === q.correct;
                if (isCorrect) currentScore++;
                const correctLabel = q.options.find(o => o.text === q.correct)?.label || q.correct;
                document.getElementById(`feedback-${q.id}`).innerHTML = generateFeedbackBlock(isCorrect, correctLabel, q.explanation);
                
                // Disable inputs and change cursor
                document.querySelectorAll(`input[name="${q.id}"]`).forEach(input => {
                    input.disabled = true;
                    input.parentElement.classList.add('cursor-default');
                    input.parentElement.classList.remove('cursor-pointer', 'hover:bg-gray-50');
                });
            });

            // Grade TF
            quizData.tf.forEach(q => {
                const isCorrect = answers[q.id] === q.correct;
                if (isCorrect) currentScore++;
                document.getElementById(`feedback-${q.id}`).innerHTML = generateFeedbackBlock(isCorrect, q.correct, q.explanation);
                
                document.querySelectorAll(`input[name="${q.id}"]`).forEach(input => {
                    input.disabled = true;
                    input.parentElement.classList.add('cursor-default');
                    input.parentElement.classList.remove('cursor-pointer', 'hover:bg-gray-50');
                });
            });

            // Grade Fill
            quizData.fill.forEach(q => {
                const isCorrect = answers[q.id] === q.accepted;
                if (isCorrect) currentScore++;
                document.getElementById(`feedback-${q.id}`).innerHTML = generateFeedbackBlock(isCorrect, q.accepted, q.explanation);
                
                const select = document.getElementById(`select-${q.id}`);
                select.disabled = true;
                select.classList.add(isCorrect ? 'border-green-500' : 'border-red-500', isCorrect ? 'text-green-700' : 'text-red-700');
                select.classList.remove('border-purple-300', 'hover:border-purple-500', 'focus:border-purple-600', 'cursor-pointer');
            });

            // Grade Match
            quizData.match.forEach(q => {
                const isCorrect = answers[q.id] === q.correctMatch;
                if (isCorrect) currentScore++;
                document.getElementById(`feedback-${q.id}`).innerHTML = generateMatchFeedback(isCorrect, q.correctMatch);
                
                const select = document.getElementById(`select-${q.id}`);
                select.disabled = true;
                select.classList.add(isCorrect ? 'bg-green-50' : 'bg-red-50', isCorrect ? 'border-green-300' : 'border-red-300', isCorrect ? 'text-green-800' : 'text-red-800');
                select.classList.remove('bg-white', 'border-gray-300', 'focus:border-orange-500', 'cursor-pointer');
            });

            // Show results
            document.getElementById('final-score').innerText = `${currentScore} / 20`;
            document.getElementById('result-container').classList.remove('hidden');
            document.getElementById('result-container').classList.add('flex');
            document.getElementById('submit-btn-container').classList.add('hidden');
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetQuiz() {
            answers = {};
            submitted = false;
            
            // Re-render entirely to reset UI state
            renderQuiz();
            
            // Hide results and show submit button
            document.getElementById('result-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('flex');
            document.getElementById('submit-btn-container').classList.remove('hidden');

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Initialization ---
        window.onload = renderQuiz;

    </script>
</body>
</html>

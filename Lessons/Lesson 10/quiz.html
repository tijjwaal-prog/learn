<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkene and Alkyne</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #eef2ff;
            /* خلفية أزرق نيلي فاتح جداً */
        }

        .en-text {
            font-family: 'Roboto', sans-serif;
            direction: ltr;
            text-align: left;
        }

        .option-btn {
            transition: all 0.3s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
        }
    </style>
</head>

<body class="min-h-screen py-10 px-4 flex justify-center items-center">

    <div class="max-w-3xl w-full">
        <!-- قسم رأس الاختبار -->
        <div class="text-center mb-8">
            <h1
                class="text-3xl md:text-4xl font-bold text-indigo-800 mb-2 en-text text-center flex justify-center items-center gap-3">
                <i class="fa-solid fa-code-merge text-indigo-600"></i>
                Alkene and Alkyne
            </h1>
            <p class="text-gray-600 font-semibold text-lg mt-3">تغطية شاملة للصفحات (99 - 112): Structures, Properties &
                Addition Reactions</p>
        </div>

        <!-- حاوية الاختبار -->
        <div id="quiz-container"
            class="bg-white rounded-2xl shadow-xl overflow-hidden fade-in border border-indigo-100">
            <!-- شريط التقدم -->
            <div class="bg-gray-200 h-2 w-full">
                <div id="progress-bar" class="theme-gradient h-2 transition-all duration-500" style="width: 0%;"></div>
            </div>

            <div class="p-6 md:p-8">
                <!-- معلومات السؤال الحالي -->
                <div class="flex justify-between items-center border-b border-indigo-100 pb-4 mb-6">
                    <span id="question-type"
                        class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">
                        Multiple Choice
                    </span>
                    <span class="text-gray-500 font-semibold text-sm border px-3 py-1 rounded-md bg-gray-50">
                        السؤال <span id="current-q-num">1</span> من <span id="total-q-num">20</span>
                    </span>
                </div>

                <!-- نص السؤال -->
                <h2 id="question-text"
                    class="en-text text-xl md:text-2xl font-bold text-slate-800 mb-6 leading-relaxed">
                    Loading question...
                </h2>

                <!-- تعليمات إضافية (لأسئلة الفراغات والتوصيل) -->
                <div id="extra-instructions"
                    class="en-text hidden mb-6 p-4 bg-purple-50 border-l-4 border-purple-500 rounded-r text-slate-800 text-sm shadow-sm">
                </div>

                <!-- الخيارات -->
                <div id="options-container" class="en-text space-y-3 mb-8">
                </div>

                <!-- صندوق التغذية الراجعة (يظهر بعد الإجابة) -->
                <div id="feedback-box" class="en-text hidden p-5 rounded-xl border mt-6 fade-in shadow-inner">
                    <div class="flex items-start gap-4">
                        <div id="feedback-icon" class="mt-1 text-2xl"></div>
                        <div class="w-full">
                            <h3 id="feedback-title" class="font-bold text-lg mb-1"></h3>
                            <div class="text-sm leading-relaxed mt-2 p-3 rounded-lg" id="feedback-content-bg">
                                <span id="feedback-explanation" class="font-medium block"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ذيل الحاوية (الأزرار) -->
            <div class="bg-slate-50 p-5 border-t border-gray-100 flex justify-between items-center">
                <div id="score-display" class="font-bold text-indigo-700 hidden text-lg flex items-center gap-2">
                    <i class="fa-solid fa-star text-indigo-500"></i> النتيجة: <span id="current-score"
                        class="text-xl">0</span>
                </div>
                <div></div> <!-- Spacer -->
                <button id="next-btn"
                    class="hidden theme-gradient hover:opacity-90 text-white font-bold py-2 px-6 rounded-lg transition-opacity flex items-center gap-2 shadow-md"
                    onclick="nextQuestion()">
                    <span id="btn-text">التالي</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </div>
        </div>

        <!-- حاوية النتيجة النهائية -->
        <div id="result-container"
            class="hidden bg-white p-8 rounded-2xl shadow-xl text-center fade-in max-w-lg mx-auto mt-10 border border-indigo-100">
            <i class="fa-solid fa-vials text-7xl text-indigo-600 mb-6 drop-shadow-md"></i>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">اكتمل الاختبار!</h2>
            <p class="text-gray-600 mb-6 font-medium">لقد أنهيت تقييم الألكينات والألكاينات بنجاح.</p>

            <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-6 mb-8 shadow-inner">
                <div class="text-6xl font-black text-indigo-700 en-text text-center">
                    <span id="final-score">0</span> <span class="text-3xl text-indigo-400">/ 20</span>
                </div>
                <p id="result-message" class="text-base text-indigo-800 mt-4 font-bold"></p>
            </div>

            <button onclick="restartQuiz()"
                class="w-full theme-gradient hover:opacity-90 text-white font-bold py-4 px-6 rounded-xl transition-opacity flex justify-center items-center gap-3 text-lg shadow-lg">
                <i class="fa-solid fa-rotate-right"></i>
                إعادة الاختبار
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            // --- Multiple Choice (1-5) ---
            {
                type: "Multiple Choice",
                q: "What is the correct IUPAC name for the straight-chain compound CH₃-CH=CH-CH₃?",
                options: ["1-Butene", "2-Butene", "Butyne", "Butane"],
                a: "2-Butene",
                exp: "The longest chain has 4 carbons (but-), and it contains a double bond (-ene). The double bond starts at carbon number 2 (numbering from either side gives 2), so it is 2-butene."
            },
            {
                type: "Multiple Choice",
                q: "According to Markovnikov's rule, the electrophilic addition of HCl to propene (CH₃-CH=CH₂) yields which major product?",
                options: ["1-Chloropropane", "2-Chloropropane", "1,2-Dichloropropane", "Propyl chloride"],
                a: "2-Chloropropane",
                exp: "Markovnikov's rule states that the H⁺ adds to the carbon of the double bond that already has more hydrogens (C1). This creates a more stable secondary (2°) carbocation at C2, which is then attacked by Cl⁻ to form 2-chloropropane."
            },
            {
                type: "Multiple Choice",
                q: "Which of the following alkynes has a weakly acidic hydrogen atom?",
                options: ["2-Butyne", "1-Butyne", "2-Pentyne", "3-Hexyne"],
                a: "1-Butyne",
                exp: "1-Butyne (CH≡C-CH₂-CH₃) is a 'terminal alkyne'. The hydrogen attached directly to the sp-hybridized carbon at the end of the chain is weakly acidic and can be removed by a strong base like NaNH₂."
            },
            {
                type: "Multiple Choice",
                q: "What specific catalyst is commonly used to partially reduce an alkyne, specifically producing a cis-alkene?",
                options: ["Pt / H₂", "Na / NH₃ (liquid)", "Lindlar's catalyst / H₂", "H₂SO₄ / Heat"],
                a: "Lindlar's catalyst / H₂",
                exp: "Lindlar's catalyst (a 'poisoned' palladium catalyst) stops the hydrogenation at the alkene stage. Because both hydrogen atoms are delivered from the surface of the solid catalyst to the same side of the alkyne, a 'syn' addition occurs, producing a cis-alkene."
            },
            {
                type: "Multiple Choice",
                q: "The dehydration of an alcohol (removing H₂O) to form an alkene is classified as what type of reaction?",
                options: ["Addition reaction", "Substitution reaction", "Elimination reaction", "Rearrangement reaction"],
                a: "Elimination reaction",
                exp: "In an elimination reaction, elements of the starting material are 'lost' or eliminated (in this case, H and OH from adjacent carbons) to form a new pi (π) bond in the product."
            },

            // --- True / False (6-10) ---
            {
                type: "True / False",
                q: "Alkenes contain a carbon-carbon double bond consisting of two pi (π) bonds.",
                options: ["True", "False"],
                a: "False",
                exp: "False. A carbon-carbon double bond (C=C) is always composed of ONE strong sigma (σ) bond and ONE weaker pi (π) bond. Only a triple bond has two pi bonds."
            },
            {
                type: "True / False",
                q: "Geometric (cis-trans) isomerism is NOT possible in 1-butene (CH₂=CH-CH₂-CH₃).",
                options: ["True", "False"],
                a: "True",
                exp: "True. For cis-trans isomerism to exist, both carbons of the double bond must be attached to two DIFFERENT groups. In 1-butene, Carbon-1 is attached to two identical Hydrogen atoms, making geometric isomerism impossible."
            },
            {
                type: "True / False",
                q: "The carbon atoms involved in the triple bond of an alkyne are sp-hybridized and exhibit a linear geometry.",
                options: ["True", "False"],
                a: "True",
                exp: "True. The sp hybridization results in two sp orbitals arranged 180° apart, giving alkynes their characteristic linear shape around the triple bond."
            },
            {
                type: "True / False",
                q: "Adding Br₂ (bromine solution) to an alkene in the dark results in a color change from reddish-brown to colorless.",
                options: ["True", "False"],
                a: "True",
                exp: "True. This is a classic visual test for unsaturation. The alkene rapidly reacts with the reddish-brown Br₂ via an addition reaction to form a colorless dibromoalkane."
            },
            {
                type: "True / False",
                q: "Symmetrical alkenes (like ethene or 2-butene) will yield two different structural isomers upon the addition of a hydrogen halide (HX).",
                options: ["True", "False"],
                a: "False",
                exp: "False. Because a symmetrical alkene is identical on both sides of the double bond, it doesn't matter which carbon gets the H and which gets the X; it will yield only ONE identical product."
            },

            // --- Fill in the Blanks (11-15) ---
            {
                type: "Fill in the Blank",
                q: "The relatively weak ________ bond in alkenes is what makes them highly reactive towards electrophilic addition reactions compared to alkanes.",
                options: ["Markovnikov", "Pi (π)", "Dehydrohalogenation", "Terminal", "Hydration"],
                a: "Pi (π)",
                exp: "The pi (π) bond is formed by the side-by-side overlap of p-orbitals. The electrons are more exposed and held less tightly than in a sigma bond, making them an excellent target for electrophiles."
            },
            {
                type: "Fill in the Blank",
                q: "________'s rule states that in the addition of HX to an asymmetrical alkene, the H atom attaches to the carbon with more hydrogen atoms.",
                options: ["Markovnikov", "Pi (π)", "Dehydrohalogenation", "Terminal", "Hydration"],
                a: "Markovnikov",
                exp: "Markovnikov's rule ensures the formation of the most stable carbocation intermediate (3° > 2° > 1°). 'The rich get richer' in terms of hydrogen atoms."
            },
            {
                type: "Fill in the Blank",
                q: "The elimination reaction that involves the removal of a hydrogen atom and a halogen atom from adjacent carbons (using a strong base) to form an alkene is called ________.",
                options: ["Markovnikov", "Pi (π)", "Dehydrohalogenation", "Terminal", "Hydration"],
                a: "Dehydrohalogenation",
                exp: "De- (removal) -hydro- (hydrogen) -halogen- (halogen) -ation. This is a primary method for synthesizing alkenes in the laboratory."
            },
            {
                type: "Fill in the Blank",
                q: "Alkynes with the triple bond located at the very end of the carbon chain (R-C≡C-H) are classified specifically as ________ alkynes.",
                options: ["Markovnikov", "Pi (π)", "Dehydrohalogenation", "Terminal", "Hydration"],
                a: "Terminal",
                exp: "Terminal alkynes are unique because of the acidic nature of that final hydrogen atom, allowing for specialized carbon-carbon bond-forming reactions."
            },
            {
                type: "Fill in the Blank",
                q: "The acid-catalyzed addition of water (H₂O) across a double bond to form an alcohol is known as a ________ reaction.",
                options: ["Markovnikov", "Pi (π)", "Dehydrohalogenation", "Terminal", "Hydration"],
                a: "Hydration",
                exp: "Hydration literally means adding water. It follows Markovnikov's rule, placing the -OH group on the more substituted carbon."
            },

            // --- Matching (16-20) ---
            {
                type: "Matching",
                q: "Match the reaction description to its correct chemical term: \nAddition of H₂ to an alkene using a metal catalyst (Pt, Pd, or Ni) to form an alkane.",
                options: ["Hydrogenation", "Hydration", "Halogenation", "Hydrohalogenation", "Ozonolysis"],
                a: "Hydrogenation",
                exp: "This is a reduction reaction where two hydrogen atoms are added across the pi bond, completely saturating the molecule."
            },
            {
                type: "Matching",
                q: "Match the reaction description to its correct chemical term: \nAddition of H₂O to an alkene in the presence of an acid catalyst (H⁺) to form an alcohol.",
                options: ["Hydrogenation", "Hydration", "Halogenation", "Hydrohalogenation", "Ozonolysis"],
                a: "Hydration",
                exp: "Hydration is the chemical addition of water. In biological systems, enzymes perform this without the need for harsh acids."
            },
            {
                type: "Matching",
                q: "Match the reaction description to its correct chemical term: \nAddition of X₂ (like Br₂ or Cl₂) to an alkene, yielding a vicinal dihalide.",
                options: ["Hydrogenation", "Hydration", "Halogenation", "Hydrohalogenation", "Ozonolysis"],
                a: "Halogenation",
                exp: "Halogenation adds two halogen atoms. Because it forms a cyclic intermediate (like a bromonium ion), it typically results in an 'anti' addition."
            },
            {
                type: "Matching",
                q: "Match the reaction description to its correct chemical term: \nAddition of HX (like HCl or HBr) to an alkene to form an alkyl halide.",
                options: ["Hydrogenation", "Hydration", "Halogenation", "Hydrohalogenation", "Ozonolysis"],
                a: "Hydrohalogenation",
                exp: "This reaction adds a Hydrogen (Hydro-) and a Halogen (-halogenation). This is the classic reaction governed by Markovnikov's rule."
            },
            {
                type: "Matching",
                q: "Match the reaction description to its correct chemical term: \nCleavage of a carbon-carbon double bond using O₃ to form aldehydes or ketones.",
                options: ["Hydrogenation", "Hydration", "Halogenation", "Hydrohalogenation", "Ozonolysis"],
                a: "Ozonolysis",
                exp: "Ozonolysis (Ozone + lysis/breaking) acts like chemical scissors, snipping the C=C double bond in half and capping each end with a double-bonded oxygen (C=O)."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let hasAnswered = false;

        const elQuestionText = document.getElementById('question-text');
        const elOptionsContainer = document.getElementById('options-container');
        const elCurrentQNum = document.getElementById('current-q-num');
        const elTotalQNum = document.getElementById('total-q-num');
        const elProgressBar = document.getElementById('progress-bar');
        const elQuestionType = document.getElementById('question-type');
        const elNextBtn = document.getElementById('next-btn');
        const elFeedbackBox = document.getElementById('feedback-box');
        const elFeedbackIcon = document.getElementById('feedback-icon');
        const elFeedbackTitle = document.getElementById('feedback-title');
        const elFeedbackContentBg = document.getElementById('feedback-content-bg');
        const elFeedbackExplanation = document.getElementById('feedback-explanation');
        const elScoreDisplay = document.getElementById('score-display');
        const elCurrentScore = document.getElementById('current-score');
        const elExtraInstructions = document.getElementById('extra-instructions');
        const elQuizContainer = document.getElementById('quiz-container');
        const elResultContainer = document.getElementById('result-container');
        const elBtnText = document.getElementById('btn-text');

        function initQuiz() {
            elTotalQNum.textContent = quizData.length;
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            const q = quizData[currentIdx];

            elCurrentQNum.textContent = currentIdx + 1;
            elProgressBar.style.width = `${((currentIdx) / quizData.length) * 100}%`;
            elQuestionType.textContent = q.type;
            elQuestionText.innerText = q.q;

            if (q.type === "Fill in the Blank") {
                elExtraInstructions.innerHTML = "<strong class='text-indigo-800'><i class='fa-solid fa-layer-group mr-2'></i> Word Bank:</strong> Markovnikov, Pi (π), Dehydrohalogenation, Terminal, Hydration";
                elExtraInstructions.classList.remove('hidden');
            } else if (q.type === "Matching") {
                elExtraInstructions.innerHTML = "<strong class='text-indigo-800'><i class='fa-solid fa-link mr-2'></i> Select the correct match from List B:</strong> Hydrogenation, Hydration, Halogenation, Hydrohalogenation, Ozonolysis";
                elExtraInstructions.classList.remove('hidden');
            } else {
                elExtraInstructions.classList.add('hidden');
            }

            elFeedbackBox.classList.add('hidden');
            elNextBtn.classList.add('hidden');
            elScoreDisplay.classList.remove('hidden');
            elCurrentScore.textContent = score;

            elOptionsContainer.innerHTML = '';
            q.options.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left bg-white border-2 border-slate-200 rounded-xl p-4 text-slate-700 font-bold hover:border-indigo-500 hover:bg-indigo-50 flex justify-between items-center";

                const spanText = document.createElement('span');
                spanText.textContent = option;
                btn.appendChild(spanText);

                const iconSpan = document.createElement('span');
                iconSpan.className = "icon-placeholder";
                btn.appendChild(iconSpan);

                btn.onclick = () => checkAnswer(option, btn);
                elOptionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOption, btnElement) {
            if (hasAnswered) return;
            hasAnswered = true;

            const q = quizData[currentIdx];
            const isCorrect = (selectedOption === q.a);
            const allBtns = elOptionsContainer.querySelectorAll('button');

            allBtns.forEach(btn => {
                btn.disabled = true;
                const btnText = btn.querySelector('span').textContent;
                const iconContainer = btn.querySelector('.icon-placeholder');

                if (btnText === q.a) {
                    btn.classList.remove('border-slate-200', 'hover:border-indigo-500', 'hover:bg-indigo-50', 'text-slate-700');
                    btn.classList.add('border-green-500', 'bg-green-50', 'text-green-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-2xl"></i>';
                } else if (btnText === selectedOption && !isCorrect) {
                    btn.classList.remove('border-slate-200', 'hover:border-indigo-500', 'hover:bg-indigo-50', 'text-slate-700');
                    btn.classList.add('border-red-500', 'bg-red-50', 'text-red-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-2xl"></i>';
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            elFeedbackBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');

            if (isCorrect) {
                score++;
                elCurrentScore.textContent = score;
                elFeedbackBox.classList.add('bg-green-50', 'border-green-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-shield-check text-green-600"></i>';
                elFeedbackTitle.textContent = "✔️ إجابة صحيحة!";
                elFeedbackTitle.className = "font-extrabold text-xl mb-1 text-green-800";

                elFeedbackContentBg.className = "text-sm leading-relaxed mt-2 p-3 rounded-lg bg-green-100 text-green-900";
                elFeedbackExplanation.innerHTML = `<strong>التوضيح العلمي:</strong> ${q.exp}`;
            } else {
                elFeedbackBox.classList.add('bg-red-50', 'border-red-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-600"></i>';
                elFeedbackTitle.textContent = "❌ إجابة خاطئة";
                elFeedbackTitle.className = "font-extrabold text-xl mb-1 text-red-800";

                elFeedbackContentBg.className = "text-sm leading-relaxed mt-2 p-4 rounded-lg bg-red-100 text-red-900 border border-red-200";
                elFeedbackExplanation.innerHTML = `
                    <div class="mb-3 border-b border-red-200 pb-2">
                        لقد اخترت: <span class="line-through opacity-75">${selectedOption}</span><br>
                        الخيار الصحيح هو: <strong class="bg-white px-2 py-1 rounded text-red-700 shadow-sm ml-1 inline-block mt-1">${q.a}</strong>
                    </div>
                    <strong>لماذا الخيار الصحيح أفضل؟</strong><br> ${q.exp}
                `;
            }

            if (currentIdx === quizData.length - 1) {
                elBtnText.textContent = "عرض النتيجة النهائية";
                elNextBtn.classList.add('px-8', 'py-3', 'text-lg');
            } else {
                elBtnText.textContent = "التالي";
            }
            elNextBtn.classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            elProgressBar.style.width = `100%`;
            elQuizContainer.classList.add('hidden');
            elResultContainer.classList.remove('hidden');

            document.getElementById('final-score').textContent = score;

            const msgEl = document.getElementById('result-message');
            if (score >= 18) {
                msgEl.textContent = "أداء كيميائي مثالي! فهمك لتفاعلات الإضافة وقاعدة ماركوفنيكوف متين جداً. 🏆";
            } else if (score >= 13) {
                msgEl.textContent = "مستوى متقدم! مع مراجعة بسيطة لكواشف التفاعلات (Reagents) ستكون بلا أخطاء. ✨";
            } else {
                msgEl.textContent = "تفاعلات الألكينات تحتاج للممارسة الكثيفة. راجع التفسيرات لكل تفاعل وحاول مجدداً! 📘";
            }
        }

        function restartQuiz() {
            currentIdx = 0;
            score = 0;
            elResultContainer.classList.add('hidden');
            elQuizContainer.classList.remove('hidden');
            elNextBtn.classList.remove('px-8', 'py-3', 'text-lg');
            loadQuestion();
        }

        // Start Quiz
        initQuiz();

    </script>
</body>

</html>

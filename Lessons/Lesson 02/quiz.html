<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الكيمياء العضوية التفاعلي (ص 26 - 38)</title>
    <!-- استدعاء Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- استدعاء FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- خطوط عربية وإنجليزية -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f3f4f6;
        }

        .en-text {
            font-family: 'Roboto', sans-serif;
            direction: ltr;
            text-align: left;
        }

        .option-btn {
            transition: all 0.3s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="min-h-screen py-10 px-4 flex justify-center items-center">

    <div class="max-w-3xl w-full">
        <!-- قسم رأس الاختبار -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-800 mb-2">
                <i class="fa-solid fa-flask text-indigo-600 ml-2"></i>
                اختبار الكيمياء العضوية التفاعلي
            </h1>
            <p class="text-gray-600 font-semibold">تغطية شاملة للصفحات (26 - 38): Alkanes & Cycloalkanes</p>
        </div>

        <!-- حاوية الاختبار -->
        <div id="quiz-container" class="bg-white rounded-2xl shadow-xl overflow-hidden fade-in">
            <!-- شريط التقدم -->
            <div class="bg-gray-200 h-2 w-full">
                <div id="progress-bar" class="bg-indigo-600 h-2 transition-all duration-500" style="width: 0%;"></div>
            </div>

            <div class="p-6 md:p-8">
                <!-- معلومات السؤال الحالي -->
                <div class="flex justify-between items-center border-b pb-4 mb-6">
                    <span id="question-type"
                        class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">
                        Multiple Choice
                    </span>
                    <span class="text-gray-500 font-semibold text-sm">
                        السؤال <span id="current-q-num">1</span> من <span id="total-q-num">20</span>
                    </span>
                </div>

                <!-- نص السؤال -->
                <h2 id="question-text" class="en-text text-xl md:text-2xl font-bold text-gray-800 mb-6 leading-relaxed">
                    Question text goes here?
                </h2>

                <!-- تعليمات إضافية (لأسئلة الفراغات والتوصيل) -->
                <div id="extra-instructions"
                    class="en-text hidden mb-6 p-4 bg-yellow-50 border-l-4 border-yellow-400 rounded-r text-gray-700 text-sm">
                    <!-- Word bank or matching list -->
                </div>

                <!-- الخيارات -->
                <div id="options-container" class="en-text space-y-3 mb-8">
                    <!-- Options injected via JS -->
                </div>

                <!-- صندوق التغذية الراجعة (يظهر بعد الإجابة) -->
                <div id="feedback-box" class="en-text hidden p-5 rounded-xl border mt-6 fade-in">
                    <div class="flex items-start gap-4">
                        <div id="feedback-icon" class="mt-1 text-2xl"></div>
                        <div>
                            <h3 id="feedback-title" class="font-bold text-lg mb-1"></h3>
                            <p id="feedback-correction" class="mb-2 font-medium text-sm hidden"></p>
                            <div class="text-sm leading-relaxed">
                                <strong>Explanation:</strong> <span id="feedback-explanation"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ذيل الحاوية (الأزرار) -->
            <div class="bg-gray-50 p-5 border-t border-gray-100 flex justify-between items-center">
                <div id="score-display" class="font-bold text-indigo-600 hidden">
                    النتيجة الحالية: <span id="current-score">0</span>
                </div>
                <div></div> <!-- Spacer -->
                <button id="next-btn"
                    class="hidden bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg transition-colors flex items-center gap-2"
                    onclick="nextQuestion()">
                    <span>التالي</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </div>
        </div>

        <!-- حاوية النتيجة النهائية -->
        <div id="result-container"
            class="hidden bg-white p-8 rounded-2xl shadow-xl text-center fade-in max-w-lg mx-auto mt-10">
            <i class="fa-solid fa-award text-6xl text-indigo-500 mb-4"></i>
            <h2 class="text-3xl font-bold text-gray-800 mb-2">اكتمل الاختبار!</h2>
            <p class="text-gray-600 mb-6">لقد أنهيت التقييم بنجاح.</p>

            <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-6 mb-8">
                <div class="text-5xl font-black text-indigo-700 en-text text-center">
                    <span id="final-score">0</span> <span class="text-2xl text-indigo-500">/ 20</span>
                </div>
                <p id="result-message" class="text-sm text-indigo-600 mt-3 font-semibold"></p>
            </div>

            <button onclick="restartQuiz()"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition-colors flex justify-center items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i>
                إعادة الاختبار
            </button>
        </div>
    </div>

    <script>
        // قاعدة بيانات الأسئلة
        const quizData = [
            // --- Multiple Choice (1-5) ---
            {
                type: "Multiple Choice",
                q: "What is the primary type of intermolecular force present in liquid alkanes?",
                options: ["Hydrogen bonding", "Dipole-dipole interactions", "London dispersion forces", "Ion-dipole forces"],
                a: "London dispersion forces",
                exp: "Alkanes are nonpolar molecules because the electronegativity difference between C and H is very small. Therefore, the only intermolecular forces holding them together are weak London dispersion forces."
            },
            {
                type: "Multiple Choice",
                q: "Which conformation of ethane (CH₃-CH₃) is the most stable?",
                options: ["Eclipsed conformation", "Staggered conformation", "Gauche conformation", "Chair conformation"],
                a: "Staggered conformation",
                exp: "In the staggered conformation, the hydrogen atoms on adjacent carbons are as far apart as possible (dihedral angle of 60°), which minimizes electron repulsion between the C-H bonds."
            },
            {
                type: "Multiple Choice",
                q: "What is the correct IUPAC name for an alkane with a 5-carbon main chain and a single methyl (-CH₃) group attached to the second carbon?",
                options: ["2-Methylpentane", "Isopentane", "2-Methylhexane", "3-Methylpentane"],
                a: "2-Methylpentane",
                exp: "The longest chain has 5 carbons (pentane). The substituent is a methyl group on carbon number 2 (numbering from the end closest to the substituent). 'Isopentane' is its common name, not IUPAC."
            },
            {
                type: "Multiple Choice",
                q: "Which of the following cycloalkanes possesses the highest amount of ring strain?",
                options: ["Cyclohexane", "Cyclopentane", "Cyclobutane", "Cyclopropane"],
                a: "Cyclopropane",
                exp: "Cyclopropane forms a 3-membered ring with internal bond angles of 60°. This severely compresses the ideal sp³ bond angle of 109.5°, causing massive angle strain and torsional strain."
            },
            {
                type: "Multiple Choice",
                q: "What are the standard products of the complete combustion of any alkane in the presence of excess oxygen?",
                options: ["Carbon monoxide and Hydrogen", "Carbon and Water", "Carbon dioxide and Water", "Alcohols and Carbon dioxide"],
                a: "Carbon dioxide and Water",
                exp: "Complete combustion of hydrocarbons (like alkanes) with sufficient O₂ always yields carbon dioxide (CO₂) and water (H₂O), along with the release of a large amount of heat."
            },

            // --- True / False (6-10) ---
            {
                type: "True / False",
                q: "Branched alkanes generally have lower boiling points than their straight-chain isomers.",
                options: ["True", "False"],
                a: "True",
                exp: "Branching makes the molecule more spherical, reducing the surface area available for London dispersion forces. Weaker intermolecular forces mean a lower boiling point."
            },
            {
                type: "True / False",
                q: "Cyclohexane is a perfectly flat (planar) molecule with 120° bond angles.",
                options: ["True", "False"],
                a: "False",
                exp: "If cyclohexane were planar, its angles would be 120°, causing massive strain. Instead, it puckers into a 3D 'chair' conformation to maintain ideal 109.5° sp³ bond angles and stagger all its hydrogens."
            },
            {
                type: "True / False",
                q: "In a Newman projection, the eclipsed conformation has a dihedral angle of 0° between the front and back substituents.",
                options: ["True", "False"],
                a: "True",
                exp: "In an eclipsed Newman projection, the bonds on the front carbon directly align with (eclipse) the bonds on the back carbon, meaning the angle between them is exactly 0°."
            },
            {
                type: "True / False",
                q: "Alkanes are highly reactive towards strong acids, strong bases, and most oxidizing agents at room temperature.",
                options: ["True", "False"],
                a: "False",
                exp: "Alkanes are known as 'paraffins' (little affinity). Because they contain only strong, nonpolar C-C and C-H sigma bonds, they are remarkably unreactive under normal conditions."
            },
            {
                type: "True / False",
                q: "Constitutional (structural) isomers have the exact same molecular formula but a different connectivity of atoms.",
                options: ["True", "False"],
                a: "True",
                exp: "Constitutional isomers share a formula (e.g., C₅H₁₂) but differ in how the atoms are connected (e.g., straight-chain pentane vs. branched 2-methylbutane)."
            },

            // --- Fill in the Blanks (11-15) ---
            {
                type: "Fill in the Blank",
                q: "A series of organic compounds that differ from one another only by the addition of a repeating -CH₂- (methylene) group is called a ________ series.",
                options: ["Homologous", "Torsional", "Chair", "Equatorial", "Halogenation"],
                a: "Homologous",
                exp: "A homologous series (like methane, ethane, propane) shares the same general formula and chemical properties, with each consecutive member adding one -CH₂- unit."
            },
            {
                type: "Fill in the Blank",
                q: "The destabilizing strain caused by the electron repulsion between aligned (eclipsed) bonds on adjacent carbons is known as ________ strain.",
                options: ["Homologous", "Torsional", "Chair", "Equatorial", "Halogenation"],
                a: "Torsional",
                exp: "Torsional strain specifically arises from the eclipsing of bonds. Molecules rotate around single bonds to adopt staggered conformations and relieve this strain."
            },
            {
                type: "Fill in the Blank",
                q: "The most stable, stress-free conformation of cyclohexane is widely known as the ________ conformation.",
                options: ["Homologous", "Torsional", "Chair", "Equatorial", "Halogenation"],
                a: "Chair",
                exp: "The chair conformation of cyclohexane has no angle strain (all angles are ~109.5°) and no torsional strain (all adjacent C-H bonds are completely staggered)."
            },
            {
                type: "Fill in the Blank",
                q: "In a monosubstituted cyclohexane ring, it is significantly more stable for the bulky substituent (like a methyl group) to occupy the ________ position to avoid steric clashes.",
                options: ["Homologous", "Torsional", "Chair", "Equatorial", "Halogenation"],
                a: "Equatorial",
                exp: "Substituents in the axial position clash with other axial hydrogens (1,3-diaxial interactions). The equatorial position points outward, providing more space and stability."
            },
            {
                type: "Fill in the Blank",
                q: "The typical substitution reaction where an alkane reacts with Cl₂ or Br₂ in the presence of UV light or heat is called radical ________.",
                options: ["Homologous", "Torsional", "Chair", "Equatorial", "Halogenation"],
                a: "Halogenation",
                exp: "Radical halogenation is one of the few reactions alkanes undergo. Light or heat breaks the halogen bond into free radicals, which then replace hydrogen atoms on the alkane chain."
            },

            // --- Matching (16-20) ---
            {
                type: "Matching",
                q: "Match the description to the correct term: \nCompounds that share the same molecular formula but have completely different physical and chemical properties due to different structures.",
                options: ["Isomers", "Newman", "Cyclopentane", "Alkyl", "Combustion"],
                a: "Isomers",
                exp: "Isomerism is a fundamental concept. Isomers have the same 'parts' (atoms) but are assembled differently, resulting in different molecules."
            },
            {
                type: "Matching",
                q: "Match the description to the correct term: \nA specific visual projection used to study the rotational conformations of a molecule by looking directly down the axis of a carbon-carbon bond.",
                options: ["Isomers", "Newman", "Cyclopentane", "Alkyl", "Combustion"],
                a: "Newman",
                exp: "A Newman projection draws the front carbon as a dot and the back carbon as a circle, making it very easy to visualize staggered and eclipsed interactions."
            },
            {
                type: "Matching",
                q: "Match the description to the correct term: \nA saturated cyclic hydrocarbon containing exactly five carbon atoms in its ring (C₅H₁₀).",
                options: ["Isomers", "Newman", "Cyclopentane", "Alkyl", "Combustion"],
                a: "Cyclopentane",
                exp: "The prefix 'cyclo-' means it forms a ring, and 'pent-' indicates 5 carbons. Cyclopentane adopts an 'envelope' conformation to slightly reduce torsional strain."
            },
            {
                type: "Matching",
                q: "Match the description to the correct term: \nA substituent group derived from an alkane by conceptually removing one hydrogen atom (e.g., -CH₃).",
                options: ["Isomers", "Newman", "Cyclopentane", "Alkyl", "Combustion"],
                a: "Alkyl",
                exp: "Alkyl groups are the branches attached to the main carbon chain. They are named by taking the alkane name and replacing '-ane' with '-yl' (Methane -> Methyl)."
            },
            {
                type: "Matching",
                q: "Match the description to the correct term: \nA highly exothermic oxidation reaction where an alkane reacts violently with oxygen to produce CO₂, H₂O, and heat.",
                options: ["Isomers", "Newman", "Cyclopentane", "Alkyl", "Combustion"],
                a: "Combustion",
                exp: "Combustion is the most economically important reaction of alkanes, as it is the process that powers internal combustion engines and fossil fuel power plants."
            }
        ];

        // المتغيرات الأساسية
        let currentIdx = 0;
        let score = 0;
        let hasAnswered = false;

        // عناصر DOM
        const elQuestionText = document.getElementById('question-text');
        const elOptionsContainer = document.getElementById('options-container');
        const elCurrentQNum = document.getElementById('current-q-num');
        const elTotalQNum = document.getElementById('total-q-num');
        const elProgressBar = document.getElementById('progress-bar');
        const elQuestionType = document.getElementById('question-type');
        const elNextBtn = document.getElementById('next-btn');
        const elFeedbackBox = document.getElementById('feedback-box');
        const elFeedbackIcon = document.getElementById('feedback-icon');
        const elFeedbackTitle = document.getElementById('feedback-title');
        const elFeedbackCorrection = document.getElementById('feedback-correction');
        const elFeedbackExplanation = document.getElementById('feedback-explanation');
        const elScoreDisplay = document.getElementById('score-display');
        const elCurrentScore = document.getElementById('current-score');
        const elExtraInstructions = document.getElementById('extra-instructions');

        const elQuizContainer = document.getElementById('quiz-container');
        const elResultContainer = document.getElementById('result-container');

        // تهيئة الاختبار
        function initQuiz() {
            elTotalQNum.textContent = quizData.length;
            loadQuestion();
        }

        // تحميل السؤال
        function loadQuestion() {
            hasAnswered = false;
            const q = quizData[currentIdx];

            // تحديث الواجهة العلوية
            elCurrentQNum.textContent = currentIdx + 1;
            elProgressBar.style.width = `${((currentIdx) / quizData.length) * 100}%`;
            elQuestionType.textContent = q.type;

            // معالجة النص ليكون متناسق
            elQuestionText.innerText = q.q;

            // التعليمات الإضافية للأنواع الخاصة
            if (q.type === "Fill in the Blank") {
                elExtraInstructions.innerHTML = "<strong>Word Bank:</strong> Homologous, Torsional, Chair, Equatorial, Halogenation";
                elExtraInstructions.classList.remove('hidden');
            } else if (q.type === "Matching") {
                elExtraInstructions.innerHTML = "<strong>Select the correct match from List B:</strong> Isomers, Newman, Cyclopentane, Alkyl, Combustion";
                elExtraInstructions.classList.remove('hidden');
            } else {
                elExtraInstructions.classList.add('hidden');
            }

            // إخفاء التغذية الراجعة والزر
            elFeedbackBox.classList.add('hidden');
            elNextBtn.classList.add('hidden');
            elScoreDisplay.classList.remove('hidden');
            elCurrentScore.textContent = score;

            // بناء الخيارات
            elOptionsContainer.innerHTML = '';
            q.options.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left bg-white border-2 border-gray-200 rounded-xl p-4 text-gray-700 font-medium hover:border-indigo-400 hover:bg-indigo-50 flex justify-between items-center";

                const spanText = document.createElement('span');
                spanText.textContent = option;
                btn.appendChild(spanText);

                const iconSpan = document.createElement('span');
                iconSpan.className = "icon-placeholder";
                btn.appendChild(iconSpan);

                btn.onclick = () => checkAnswer(option, btn);
                elOptionsContainer.appendChild(btn);
            });
        }

        // التحقق من الإجابة
        function checkAnswer(selectedOption, btnElement) {
            if (hasAnswered) return;
            hasAnswered = true;

            const q = quizData[currentIdx];
            const isCorrect = (selectedOption === q.a);
            const allBtns = elOptionsContainer.querySelectorAll('button');

            // تعطيل جميع الأزرار وتلوينها
            allBtns.forEach(btn => {
                btn.disabled = true;
                const btnText = btn.querySelector('span').textContent;
                const iconContainer = btn.querySelector('.icon-placeholder');

                if (btnText === q.a) {
                    btn.classList.remove('border-gray-200', 'hover:border-indigo-400', 'hover:bg-indigo-50', 'text-gray-700');
                    btn.classList.add('border-green-500', 'bg-green-50', 'text-green-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-xl"></i>';
                } else if (btnText === selectedOption && !isCorrect) {
                    btn.classList.remove('border-gray-200', 'hover:border-indigo-400', 'hover:bg-indigo-50', 'text-gray-700');
                    btn.classList.add('border-red-500', 'bg-red-50', 'text-red-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-xl"></i>';
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            // إعداد صندوق التغذية الراجعة
            elFeedbackBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');
            elFeedbackCorrection.classList.add('hidden');

            if (isCorrect) {
                score++;
                elCurrentScore.textContent = score;
                elFeedbackBox.classList.add('bg-green-50', 'border-green-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-circle-check text-green-600"></i>';
                elFeedbackTitle.textContent = "✔️ Correct!";
                elFeedbackTitle.className = "font-bold text-lg mb-1 text-green-800";
                elFeedbackExplanation.parentElement.className = "text-sm leading-relaxed text-green-700";
            } else {
                elFeedbackBox.classList.add('bg-red-50', 'border-red-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-600"></i>';
                elFeedbackTitle.textContent = "❌ Incorrect";
                elFeedbackTitle.className = "font-bold text-lg mb-1 text-red-800";

                elFeedbackCorrection.innerHTML = `You chose <span class="line-through opacity-75">${selectedOption}</span>. The correct answer is <strong>${q.a}</strong>.`;
                elFeedbackCorrection.classList.remove('hidden');
                elFeedbackCorrection.className = "mb-2 font-medium text-sm text-red-700";

                elFeedbackExplanation.parentElement.className = "text-sm leading-relaxed text-red-700";
            }

            elFeedbackExplanation.textContent = q.exp;

            // إظهار زر التالي
            if (currentIdx === quizData.length - 1) {
                elNextBtn.querySelector('span').textContent = "عرض النتيجة";
                elNextBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
                elNextBtn.classList.add('bg-gray-800', 'hover:bg-gray-900');
            }
            elNextBtn.classList.remove('hidden');
        }

        // الانتقال للسؤال التالي أو إنهاء الاختبار
        function nextQuestion() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        // عرض النتيجة النهائية
        function showResults() {
            elProgressBar.style.width = `100%`;
            elQuizContainer.classList.add('hidden');
            elResultContainer.classList.remove('hidden');

            document.getElementById('final-score').textContent = score;

            const msgEl = document.getElementById('result-message');
            if (score >= 18) {
                msgEl.textContent = "ممتاز جداً! لديك فهم عميق للمفاهيم الكيميائية (Alkanes & Conformations).";
            } else if (score >= 13) {
                msgEl.textContent = "عمل جيد! تحتاج لمراجعة بسيطة لبعض المتشكلات والتسميات.";
            } else {
                msgEl.textContent = "لا بأس، حاول قراءة التفسيرات بدقة وإعادة الاختبار لترسيخ المفاهيم.";
            }
        }

        // إعادة الاختبار
        function restartQuiz() {
            currentIdx = 0;
            score = 0;
            elResultContainer.classList.add('hidden');
            elQuizContainer.classList.remove('hidden');

            elNextBtn.querySelector('span').textContent = "التالي";
            elNextBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
            elNextBtn.classList.remove('bg-gray-800', 'hover:bg-gray-900');

            loadQuestion();
        }

        // بدء التشغيل
        initQuiz();

    </script>
</body>

</html>

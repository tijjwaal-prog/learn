<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Groups Quiz</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f0fdfa;
            /* لون سماوي فاتح جداً للخلفية */
        }

        .en-text {
            font-family: 'Roboto', sans-serif;
            direction: ltr;
            text-align: left;
        }

        .option-btn {
            transition: all 0.3s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-gradient {
            background: linear-gradient(135deg, #0284c7 0%, #0d9488 100%);
        }
    </style>
</head>

<body class="min-h-screen py-10 px-4 flex justify-center items-center">

    <div class="max-w-3xl w-full">
        <!-- قسم رأس الاختبار -->
        <div class="text-center mb-8">
            <h1
                class="text-3xl md:text-4xl font-bold text-cyan-800 mb-2 en-text text-center flex justify-center items-center gap-3">
                <i class="fa-solid fa-diagram-project text-cyan-600"></i>
                Functional Groups
            </h1>
            <p class="text-gray-600 font-semibold text-lg mt-3">تغطية شاملة للصفحات (61 - 64): Identification &
                Structures</p>
        </div>

        <!-- حاوية الاختبار -->
        <div id="quiz-container" class="bg-white rounded-2xl shadow-xl overflow-hidden fade-in border border-cyan-100">
            <!-- شريط التقدم -->
            <div class="bg-gray-200 h-2 w-full">
                <div id="progress-bar" class="theme-gradient h-2 transition-all duration-500" style="width: 0%;"></div>
            </div>

            <div class="p-6 md:p-8">
                <!-- معلومات السؤال الحالي -->
                <div class="flex justify-between items-center border-b border-cyan-100 pb-4 mb-6">
                    <span id="question-type"
                        class="bg-cyan-100 text-cyan-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">
                        Multiple Choice
                    </span>
                    <span class="text-gray-500 font-semibold text-sm border px-3 py-1 rounded-md bg-gray-50">
                        السؤال <span id="current-q-num">1</span> من <span id="total-q-num">20</span>
                    </span>
                </div>

                <!-- نص السؤال -->
                <h2 id="question-text"
                    class="en-text text-xl md:text-2xl font-bold text-slate-800 mb-6 leading-relaxed">
                    Loading question...
                </h2>

                <!-- تعليمات إضافية (لأسئلة الفراغات والتوصيل) -->
                <div id="extra-instructions"
                    class="en-text hidden mb-6 p-4 bg-sky-50 border-l-4 border-sky-500 rounded-r text-slate-800 text-sm shadow-sm">
                </div>

                <!-- الخيارات -->
                <div id="options-container" class="en-text space-y-3 mb-8">
                </div>

                <!-- صندوق التغذية الراجعة (يظهر بعد الإجابة) -->
                <div id="feedback-box" class="en-text hidden p-5 rounded-xl border mt-6 fade-in shadow-inner">
                    <div class="flex items-start gap-4">
                        <div id="feedback-icon" class="mt-1 text-2xl"></div>
                        <div class="w-full">
                            <h3 id="feedback-title" class="font-bold text-lg mb-1"></h3>
                            <div class="text-sm leading-relaxed mt-2 p-3 rounded-lg" id="feedback-content-bg">
                                <span id="feedback-explanation" class="font-medium block"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ذيل الحاوية (الأزرار) -->
            <div class="bg-slate-50 p-5 border-t border-gray-100 flex justify-between items-center">
                <div id="score-display" class="font-bold text-cyan-700 hidden text-lg flex items-center gap-2">
                    <i class="fa-solid fa-star text-cyan-500"></i> النتيجة: <span id="current-score"
                        class="text-xl">0</span>
                </div>
                <div></div> <!-- Spacer -->
                <button id="next-btn"
                    class="hidden theme-gradient hover:opacity-90 text-white font-bold py-2 px-6 rounded-lg transition-opacity flex items-center gap-2 shadow-md"
                    onclick="nextQuestion()">
                    <span id="btn-text">التالي</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </div>
        </div>

        <!-- حاوية النتيجة النهائية -->
        <div id="result-container"
            class="hidden bg-white p-8 rounded-2xl shadow-xl text-center fade-in max-w-lg mx-auto mt-10 border border-cyan-100">
            <i class="fa-solid fa-microscope text-7xl text-cyan-600 mb-6 drop-shadow-md"></i>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">اكتمل الاختبار!</h2>
            <p class="text-gray-600 mb-6 font-medium">لقد أنهيت تقييم المجموعات الوظيفية بنجاح.</p>

            <div class="bg-cyan-50 border border-cyan-200 rounded-xl p-6 mb-8 shadow-inner">
                <div class="text-6xl font-black text-cyan-700 en-text text-center">
                    <span id="final-score">0</span> <span class="text-3xl text-cyan-400">/ 20</span>
                </div>
                <p id="result-message" class="text-base text-cyan-800 mt-4 font-bold"></p>
            </div>

            <button onclick="restartQuiz()"
                class="w-full theme-gradient hover:opacity-90 text-white font-bold py-4 px-6 rounded-xl transition-opacity flex justify-center items-center gap-3 text-lg shadow-lg">
                <i class="fa-solid fa-rotate-right"></i>
                إعادة الاختبار
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            // --- Multiple Choice (1-5) ---
            {
                type: "Multiple Choice",
                q: "Which functional group is present in the molecule CH₃-CH₂-OH?",
                options: ["Carboxylic acid", "Ether", "Alcohol", "Ketone"],
                a: "Alcohol",
                exp: "The -OH (hydroxyl) group attached directly to an sp³ hybridized (saturated) carbon atom is the defining characteristic of an alcohol."
            },
            {
                type: "Multiple Choice",
                q: "What is the general structural formula for a ketone?",
                options: ["R-CHO", "R-CO-R'", "R-O-R'", "R-COOH"],
                a: "R-CO-R'",
                exp: "A ketone contains a carbonyl group (C=O) bonded to two other carbon atoms (R and R'). R-CHO represents an aldehyde, where the carbonyl is attached to at least one hydrogen."
            },
            {
                type: "Multiple Choice",
                q: "The presence of a nitrogen atom bonded to carbon atoms (e.g., R-NH₂) indicates which functional group?",
                options: ["Amide", "Amine", "Nitrile", "Nitro"],
                a: "Amine",
                exp: "Amines are organic derivatives of ammonia (NH₃) where one, two, or all three hydrogen atoms are replaced by alkyl or aryl (carbon) groups."
            },
            {
                type: "Multiple Choice",
                q: "Which functional group contains BOTH a carbonyl group (C=O) and a hydroxyl group (-OH) attached to the exact same carbon atom?",
                options: ["Ester", "Aldehyde", "Carboxylic Acid", "Alcohol"],
                a: "Carboxylic Acid",
                exp: "The -COOH group is known as the carboxyl group. It combines a carbonyl (C=O) and a hydroxyl (-OH) group on the same carbon, which gives the molecule its acidic properties."
            },
            {
                type: "Multiple Choice",
                q: "An organic compound with the structure R-C(=O)-O-R' belongs to which class of compounds?",
                options: ["Ethers", "Esters", "Carboxylic acids", "Anhydrides"],
                a: "Esters",
                exp: "Esters are formed from a carboxylic acid and an alcohol. The structural linkage consists of a carbonyl group adjacent to an ether-like oxygen (R-COO-R')."
            },

            // --- True / False (6-10) ---
            {
                type: "True / False",
                q: "Aldehydes always have their carbonyl group (C=O) at the end (terminal) of a carbon chain.",
                options: ["True", "False"],
                a: "True",
                exp: "Because the structure of an aldehyde is R-CHO, the carbonyl carbon must be attached to at least one hydrogen atom. This forces it to be at the absolute end of the carbon skeleton."
            },
            {
                type: "True / False",
                q: "Ethers have the general formula R-OH, where an oxygen atom is bonded to a hydrogen atom.",
                options: ["True", "False"],
                a: "False",
                exp: "Ethers have the general formula R-O-R', where an oxygen atom bridges two carbon groups. R-OH is the formula for an alcohol."
            },
            {
                type: "True / False",
                q: "An amide is formed when the -OH of a carboxylic acid is conceptually replaced by an amino group (-NH₂).",
                options: ["True", "False"],
                a: "True",
                exp: "Amides contain the functional group -C(=O)N-, which is a carbonyl group directly attached to a nitrogen atom. They are key components of proteins (peptide bonds)."
            },
            {
                type: "True / False",
                q: "Alkyl halides (haloalkanes) contain a halogen atom (F, Cl, Br, or I) bonded to an sp² hybridized carbon of a double bond.",
                options: ["True", "False"],
                a: "False",
                exp: "Alkyl halides have a halogen bonded to a single-bonded, sp³ hybridized carbon. If the halogen is bonded to an sp² carbon of an alkene, it is called a vinylic halide, not an alkyl halide."
            },
            {
                type: "True / False",
                q: "Functional groups are the specific parts of a molecule that determine its chemical properties and reactivity.",
                options: ["True", "False"],
                a: "True",
                exp: "While the carbon backbone provides the inert physical framework, the functional groups are the 'active sites' where chemical reactions occur."
            },

            // --- Fill in the Blanks (11-15) ---
            {
                type: "Fill in the Blank",
                q: "The -OH group is called the ________ group and is the defining characteristic of both alcohols and phenols.",
                options: ["Carbonyl", "Hydroxyl", "Aromatic", "Ester", "Halogen"],
                a: "Hydroxyl",
                exp: "The hydroxyl group (-OH) is highly polar and allows molecules like alcohols to participate in hydrogen bonding, significantly increasing their boiling points."
            },
            {
                type: "Fill in the Blank",
                q: "The C=O double bond is known as the ________ group, which is a structural feature shared by aldehydes, ketones, carboxylic acids, and amides.",
                options: ["Carbonyl", "Hydroxyl", "Aromatic", "Ester", "Halogen"],
                a: "Carbonyl",
                exp: "The carbonyl group is strongly polarized (carbon is partially positive, oxygen is partially negative), making it a prime target for nucleophilic attack."
            },
            {
                type: "Fill in the Blank",
                q: "A benzene ring attached to a main chain as a substituent (C₆H₅-) is an example of an ________ group, specifically called a phenyl group.",
                options: ["Carbonyl", "Hydroxyl", "Aromatic", "Ester", "Halogen"],
                a: "Aromatic",
                exp: "Aromatic rings (like benzene) have specialized stability due to a continuous ring of delocalized pi electrons."
            },
            {
                type: "Fill in the Blank",
                q: "The functional group represented generally by -X (where X = F, Cl, Br, I) is the ________ group.",
                options: ["Carbonyl", "Hydroxyl", "Aromatic", "Ester", "Halogen"],
                a: "Halogen",
                exp: "Halogens are highly electronegative. When attached to an alkyl chain, they create a polar carbon-halogen bond, making the carbon susceptible to nucleophilic substitution."
            },
            {
                type: "Fill in the Blank",
                q: "The sweet smell of many fruits and flowers is naturally due to the presence of the ________ functional group (R-COO-R').",
                options: ["Carbonyl", "Hydroxyl", "Aromatic", "Ester", "Halogen"],
                a: "Ester",
                exp: "Esters are volatile, neutral compounds widely known for their pleasant, fruity, or floral odors and are heavily used in flavorings and perfumes."
            },

            // --- Matching (16-20) ---
            {
                type: "Matching",
                q: "Match to the correct functional group structure: \nR-O-R' (An oxygen atom bridging two alkyl or aryl groups).",
                options: ["Carboxylic Acid", "Aldehyde", "Ether", "Amine", "Ketone"],
                a: "Ether",
                exp: "Ethers (R-O-R') are generally unreactive chemically, which makes them excellent solvents for conducting organic reactions (e.g., Diethyl ether)."
            },
            {
                type: "Matching",
                q: "Match to the correct functional group structure: \nR-NH₂ (A nitrogen atom attached to an alkyl group).",
                options: ["Carboxylic Acid", "Aldehyde", "Ether", "Amine", "Ketone"],
                a: "Amine",
                exp: "Amines are basic in nature because the nitrogen atom possesses a lone pair of electrons that can accept a proton (H⁺)."
            },
            {
                type: "Matching",
                q: "Match to the correct functional group structure: \nR-COOH (A carbonyl group directly bonded to a hydroxyl group).",
                options: ["Carboxylic Acid", "Aldehyde", "Ether", "Amine", "Ketone"],
                a: "Carboxylic Acid",
                exp: "Carboxylic acids act as weak acids because the resulting carboxylate ion (after losing H⁺) is highly stabilized by resonance."
            },
            {
                type: "Matching",
                q: "Match to the correct functional group structure: \nR-CHO (A carbonyl group directly bonded to at least one hydrogen atom).",
                options: ["Carboxylic Acid", "Aldehyde", "Ether", "Amine", "Ketone"],
                a: "Aldehyde",
                exp: "The presence of the C-H bond on the carbonyl carbon makes aldehydes easily oxidizable into carboxylic acids, unlike ketones."
            },
            {
                type: "Matching",
                q: "Match to the correct functional group structure: \nR-CO-R' (A carbonyl group bonded between two carbon atoms).",
                options: ["Carboxylic Acid", "Aldehyde", "Ether", "Amine", "Ketone"],
                a: "Ketone",
                exp: "Ketones (like Acetone) have the carbonyl group securely positioned in the middle of the carbon skeleton, making them resistant to mild oxidation."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let hasAnswered = false;

        const elQuestionText = document.getElementById('question-text');
        const elOptionsContainer = document.getElementById('options-container');
        const elCurrentQNum = document.getElementById('current-q-num');
        const elTotalQNum = document.getElementById('total-q-num');
        const elProgressBar = document.getElementById('progress-bar');
        const elQuestionType = document.getElementById('question-type');
        const elNextBtn = document.getElementById('next-btn');
        const elFeedbackBox = document.getElementById('feedback-box');
        const elFeedbackIcon = document.getElementById('feedback-icon');
        const elFeedbackTitle = document.getElementById('feedback-title');
        const elFeedbackContentBg = document.getElementById('feedback-content-bg');
        const elFeedbackExplanation = document.getElementById('feedback-explanation');
        const elScoreDisplay = document.getElementById('score-display');
        const elCurrentScore = document.getElementById('current-score');
        const elExtraInstructions = document.getElementById('extra-instructions');
        const elQuizContainer = document.getElementById('quiz-container');
        const elResultContainer = document.getElementById('result-container');
        const elBtnText = document.getElementById('btn-text');

        function initQuiz() {
            elTotalQNum.textContent = quizData.length;
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            const q = quizData[currentIdx];

            elCurrentQNum.textContent = currentIdx + 1;
            elProgressBar.style.width = `${((currentIdx) / quizData.length) * 100}%`;
            elQuestionType.textContent = q.type;
            elQuestionText.innerText = q.q;

            if (q.type === "Fill in the Blank") {
                elExtraInstructions.innerHTML = "<strong class='text-cyan-800'><i class='fa-solid fa-layer-group mr-2'></i> Word Bank:</strong> Carbonyl, Hydroxyl, Aromatic, Ester, Halogen";
                elExtraInstructions.classList.remove('hidden');
            } else if (q.type === "Matching") {
                elExtraInstructions.innerHTML = "<strong class='text-cyan-800'><i class='fa-solid fa-link mr-2'></i> Select the correct match from List B:</strong> Carboxylic Acid, Aldehyde, Ether, Amine, Ketone";
                elExtraInstructions.classList.remove('hidden');
            } else {
                elExtraInstructions.classList.add('hidden');
            }

            elFeedbackBox.classList.add('hidden');
            elNextBtn.classList.add('hidden');
            elScoreDisplay.classList.remove('hidden');
            elCurrentScore.textContent = score;

            elOptionsContainer.innerHTML = '';
            q.options.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left bg-white border-2 border-slate-200 rounded-xl p-4 text-slate-700 font-bold hover:border-cyan-400 hover:bg-cyan-50 flex justify-between items-center";

                const spanText = document.createElement('span');
                spanText.textContent = option;
                btn.appendChild(spanText);

                const iconSpan = document.createElement('span');
                iconSpan.className = "icon-placeholder";
                btn.appendChild(iconSpan);

                btn.onclick = () => checkAnswer(option, btn);
                elOptionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOption, btnElement) {
            if (hasAnswered) return;
            hasAnswered = true;

            const q = quizData[currentIdx];
            const isCorrect = (selectedOption === q.a);
            const allBtns = elOptionsContainer.querySelectorAll('button');

            allBtns.forEach(btn => {
                btn.disabled = true;
                const btnText = btn.querySelector('span').textContent;
                const iconContainer = btn.querySelector('.icon-placeholder');

                if (btnText === q.a) {
                    btn.classList.remove('border-slate-200', 'hover:border-cyan-400', 'hover:bg-cyan-50', 'text-slate-700');
                    btn.classList.add('border-green-500', 'bg-green-50', 'text-green-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-2xl"></i>';
                } else if (btnText === selectedOption && !isCorrect) {
                    btn.classList.remove('border-slate-200', 'hover:border-cyan-400', 'hover:bg-cyan-50', 'text-slate-700');
                    btn.classList.add('border-red-500', 'bg-red-50', 'text-red-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-2xl"></i>';
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            elFeedbackBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');

            if (isCorrect) {
                score++;
                elCurrentScore.textContent = score;
                elFeedbackBox.classList.add('bg-green-50', 'border-green-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-shield-check text-green-600"></i>';
                elFeedbackTitle.textContent = "✔️ إجابة صحيحة!";
                elFeedbackTitle.className = "font-extrabold text-xl mb-1 text-green-800";

                elFeedbackContentBg.className = "text-sm leading-relaxed mt-2 p-3 rounded-lg bg-green-100 text-green-900";
                elFeedbackExplanation.innerHTML = `<strong>التوضيح العلمي:</strong> ${q.exp}`;
            } else {
                elFeedbackBox.classList.add('bg-red-50', 'border-red-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-600"></i>';
                elFeedbackTitle.textContent = "❌ إجابة خاطئة";
                elFeedbackTitle.className = "font-extrabold text-xl mb-1 text-red-800";

                elFeedbackContentBg.className = "text-sm leading-relaxed mt-2 p-4 rounded-lg bg-red-100 text-red-900 border border-red-200";
                elFeedbackExplanation.innerHTML = `
                    <div class="mb-3 border-b border-red-200 pb-2">
                        لقد اخترت: <span class="line-through opacity-75">${selectedOption}</span><br>
                        الخيار الصحيح هو: <strong class="bg-white px-2 py-1 rounded text-red-700 shadow-sm ml-1 inline-block mt-1">${q.a}</strong>
                    </div>
                    <strong>لماذا الخيار الصحيح أفضل؟</strong><br> ${q.exp}
                `;
            }

            if (currentIdx === quizData.length - 1) {
                elBtnText.textContent = "عرض النتيجة النهائية";
                elNextBtn.classList.add('px-8', 'py-3', 'text-lg');
            } else {
                elBtnText.textContent = "التالي";
            }
            elNextBtn.classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            elProgressBar.style.width = `100%`;
            elQuizContainer.classList.add('hidden');
            elResultContainer.classList.remove('hidden');

            document.getElementById('final-score').textContent = score;

            const msgEl = document.getElementById('result-message');
            if (score >= 18) {
                msgEl.textContent = "أداء كيميائي مذهل! أنت تميز المجموعات الوظيفية ببراعة. 🧪👨‍🔬";
            } else if (score >= 13) {
                msgEl.textContent = "مستوى ممتاز! بعض التمييز الدقيق بين المجموعات المتشابهة (كالكتيون والألدهيد) سيجعلك خبيراً. 👍";
            } else {
                msgEl.textContent = "المجموعات الوظيفية تحتاج إلى حفظ وتدريب بصري. راجع التفسيرات وأعد المحاولة بثقة! 📘";
            }
        }

        function restartQuiz() {
            currentIdx = 0;
            score = 0;
            elResultContainer.classList.add('hidden');
            elQuizContainer.classList.remove('hidden');
            elNextBtn.classList.remove('px-8', 'py-3', 'text-lg');
            loadQuestion();
        }

        // Start Quiz
        initQuiz();

    </script>
</body>

</html>

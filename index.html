<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition and Substitution Reactions Compared</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            /* خلفية رمادية مزرقة فاتحة جداً */
        }

        .en-text {
            font-family: 'Roboto', sans-serif;
            direction: ltr;
            text-align: left;
        }

        .option-btn {
            transition: all 0.3s ease;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-gradient {
            background: linear-gradient(135deg, #0f766e 0%, #0369a1 100%);
        }
    </style>
</head>

<body class="min-h-screen py-10 px-4 flex justify-center items-center">

    <div class="max-w-3xl w-full">
        <!-- قسم رأس الاختبار -->
        <div class="text-center mb-8">
            <h1
                class="text-3xl md:text-4xl font-bold text-teal-800 mb-2 en-text text-center flex justify-center items-center gap-3">
                <i class="fa-solid fa-scale-balanced text-teal-600"></i>
                Addition & Substitution Reactions Compared
            </h1>
            <p class="text-gray-600 font-semibold text-lg mt-3">تغطية شاملة للصفحات (113 - 126): Alkenes vs. Aromatics &
                Alkanes</p>
        </div>

        <!-- حاوية الاختبار -->
        <div id="quiz-container" class="bg-white rounded-2xl shadow-xl overflow-hidden fade-in border border-teal-100">
            <!-- شريط التقدم -->
            <div class="bg-gray-200 h-2 w-full">
                <div id="progress-bar" class="theme-gradient h-2 transition-all duration-500" style="width: 0%;"></div>
            </div>

            <div class="p-6 md:p-8">
                <!-- معلومات السؤال الحالي -->
                <div class="flex justify-between items-center border-b border-teal-100 pb-4 mb-6">
                    <span id="question-type"
                        class="bg-teal-100 text-teal-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide">
                        Multiple Choice
                    </span>
                    <span class="text-gray-500 font-semibold text-sm border px-3 py-1 rounded-md bg-gray-50">
                        السؤال <span id="current-q-num">1</span> من <span id="total-q-num">20</span>
                    </span>
                </div>

                <!-- نص السؤال -->
                <h2 id="question-text"
                    class="en-text text-xl md:text-2xl font-bold text-slate-800 mb-6 leading-relaxed">
                    Loading question...
                </h2>

                <!-- تعليمات إضافية (لأسئلة الفراغات والتوصيل) -->
                <div id="extra-instructions"
                    class="en-text hidden mb-6 p-4 bg-sky-50 border-l-4 border-sky-500 rounded-r text-slate-800 text-sm shadow-sm">
                </div>

                <!-- الخيارات -->
                <div id="options-container" class="en-text space-y-3 mb-8">
                </div>

                <!-- صندوق التغذية الراجعة (يظهر بعد الإجابة) -->
                <div id="feedback-box" class="en-text hidden p-5 rounded-xl border mt-6 fade-in shadow-inner">
                    <div class="flex items-start gap-4">
                        <div id="feedback-icon" class="mt-1 text-2xl"></div>
                        <div class="w-full">
                            <h3 id="feedback-title" class="font-bold text-lg mb-1"></h3>
                            <div class="text-sm leading-relaxed mt-2 p-3 rounded-lg" id="feedback-content-bg">
                                <span id="feedback-explanation" class="font-medium block"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ذيل الحاوية (الأزرار) -->
            <div class="bg-slate-50 p-5 border-t border-gray-100 flex justify-between items-center">
                <div id="score-display" class="font-bold text-teal-700 hidden text-lg flex items-center gap-2">
                    <i class="fa-solid fa-star text-teal-500"></i> النتيجة: <span id="current-score"
                        class="text-xl">0</span>
                </div>
                <div></div> <!-- Spacer -->
                <button id="next-btn"
                    class="hidden theme-gradient hover:opacity-90 text-white font-bold py-2 px-6 rounded-lg transition-opacity flex items-center gap-2 shadow-md"
                    onclick="nextQuestion()">
                    <span id="btn-text">التالي</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </div>
        </div>

        <!-- حاوية النتيجة النهائية -->
        <div id="result-container"
            class="hidden bg-white p-8 rounded-2xl shadow-xl text-center fade-in max-w-lg mx-auto mt-10 border border-teal-100">
            <i class="fa-solid fa-microscope text-7xl text-teal-600 mb-6 drop-shadow-md"></i>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">اكتمل الاختبار!</h2>
            <p class="text-gray-600 mb-6 font-medium">لقد أنهيت التقييم المقارن لتفاعلات الإضافة والاستبدال.</p>

            <div class="bg-teal-50 border border-teal-200 rounded-xl p-6 mb-8 shadow-inner">
                <div class="text-6xl font-black text-teal-700 en-text text-center">
                    <span id="final-score">0</span> <span class="text-3xl text-teal-400">/ 20</span>
                </div>
                <p id="result-message" class="text-base text-teal-800 mt-4 font-bold"></p>
            </div>

            <button onclick="restartQuiz()"
                class="w-full theme-gradient hover:opacity-90 text-white font-bold py-4 px-6 rounded-xl transition-opacity flex justify-center items-center gap-3 text-lg shadow-lg">
                <i class="fa-solid fa-rotate-right"></i>
                إعادة الاختبار
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            // --- Multiple Choice (1-5) ---
            {
                type: "Multiple Choice",
                q: "Why does benzene primarily undergo electrophilic substitution rather than electrophilic addition?",
                options: ["Addition would destroy its stable aromatic pi system.", "Substitution is faster than addition.", "Benzene has no pi electrons to undergo addition.", "Benzene is too sterically hindered for addition."],
                a: "Addition would destroy its stable aromatic pi system.",
                exp: "Aromaticity provides massive thermodynamic stability (resonance energy). Addition breaks the continuous ring of pi electrons, destroying this stability. Substitution replaces a hydrogen, preserving the aromatic ring."
            },
            {
                type: "Multiple Choice",
                q: "When cyclohexene reacts with bromine (Br₂), what type of reaction occurs?",
                options: ["Nucleophilic Substitution", "Electrophilic Addition", "Electrophilic Substitution", "Free-Radical Substitution"],
                a: "Electrophilic Addition",
                exp: "Cyclohexene is an alkene. The weak pi bond acts as a nucleophile, attacking the electrophilic bromine. The pi bond breaks to form two new C-Br sigma bonds, defining an addition reaction."
            },
            {
                type: "Multiple Choice",
                q: "What catalyst is fundamentally required for benzene to react with Br₂ in a substitution reaction?",
                options: ["A strong base (NaOH)", "A strong acid (H₂SO₄)", "A Lewis acid (like FeBr₃ or AlBr₃)", "UV light (hν)"],
                a: "A Lewis acid (like FeBr₃ or AlBr₃)",
                exp: "Benzene's pi cloud is stable and not reactive enough to attack neutral Br₂. A Lewis acid catalyst (FeBr₃) polarizes the Br-Br bond, creating a powerful Br⁺ electrophile capable of attacking the ring."
            },
            {
                type: "Multiple Choice",
                q: "In a substitution reaction of an alkane (like CH₄ + Cl₂), what fundamentally happens to the molecule?",
                options: ["Two molecules combine into one larger molecule.", "A pi bond is broken.", "An atom or group is replaced by another atom or group.", "The carbon skeleton rearranges completely."],
                a: "An atom or group is replaced by another atom or group.",
                exp: "Substitution involves swapping parts. In alkanes, a hydrogen atom is substituted by a halogen atom (forming CH₃Cl and HCl). No unsaturation (pi bonds) is gained or lost."
            },
            {
                type: "Multiple Choice",
                q: "Compare the reaction of ethene (CH₂=CH₂) and benzene (C₆H₆) with Bromine. Which statement is correct?",
                options: ["Both require a Lewis acid catalyst.", "Both undergo addition to form saturated products.", "Ethene undergoes addition (fast), while benzene requires a catalyst to undergo substitution (slow).", "Benzene undergoes addition (fast), while ethene undergoes substitution."],
                a: "Ethene undergoes addition (fast), while benzene requires a catalyst to undergo substitution (slow).",
                exp: "Alkenes (ethene) readily undergo addition to form 1,2-dibromoethane. Aromatic rings (benzene) resist addition and require harsh conditions/catalysts to force substitution (forming bromobenzene)."
            },

            // --- True / False (6-10) ---
            {
                type: "True / False",
                q: "Addition reactions typically result in an increase in the degree of unsaturation (more pi bonds).",
                options: ["True", "False"],
                a: "False",
                exp: "False. Addition reactions DECREASE unsaturation. You are 'adding' atoms to the molecule, which forces the breaking of double/triple (pi) bonds to form single (sigma) bonds."
            },
            {
                type: "True / False",
                q: "Benzene decolorizes reddish-brown bromine water (Br₂/H₂O) rapidly at room temperature without a catalyst.",
                options: ["True", "False"],
                a: "False",
                exp: "False. This is a classic test to distinguish alkenes from benzene. Alkenes decolorize bromine water instantly (via addition). Benzene does NOT react without a Lewis acid catalyst."
            },
            {
                type: "True / False",
                q: "Electrophilic aromatic substitution involves an intermediate called a sigma complex (or arenium ion), which temporarily loses its aromaticity.",
                options: ["True", "False"],
                a: "True",
                exp: "True. When the electrophile attacks benzene, one sp² carbon becomes sp³, breaking the continuous pi ring. Aromaticity is quickly restored when a base removes a proton in the final step."
            },
            {
                type: "True / False",
                q: "Radical halogenation of alkanes is a type of substitution reaction.",
                options: ["True", "False"],
                a: "True",
                exp: "True. A hydrogen atom on the alkane is replaced (substituted) by a halogen atom through a free-radical mechanism. Because it's an alkane, addition is impossible (no pi bonds to break)."
            },
            {
                type: "True / False",
                q: "In an addition reaction, two reactant molecules combine to form two separate product molecules.",
                options: ["True", "False"],
                a: "False",
                exp: "False. In a standard addition reaction (A + B → C), two molecules combine to form exactly ONE product molecule (e.g., Ethene + HBr → Bromoethane)."
            },

            // --- Fill in the Blanks (11-15) ---
            {
                type: "Fill in the Blank",
                q: "Alkenes are highly reactive and naturally undergo ________ reactions because their pi electrons are loosely held and exposed to electrophiles.",
                options: ["Aromaticity", "Addition", "Catalyst", "Nucleophile", "Pi (π)"],
                a: "Addition",
                exp: "The defining characteristic of alkenes is their tendency to undergo addition reactions, transforming the unsaturated double bond into a saturated single bond."
            },
            {
                type: "Fill in the Blank",
                q: "Benzene strongly resists addition reactions because they would destroy its special resonance stability, known as ________.",
                options: ["Aromaticity", "Addition", "Catalyst", "Nucleophile", "Pi (π)"],
                a: "Aromaticity",
                exp: "Aromaticity (the delocalization of 6 pi electrons in a cyclic system) provides benzene with an unusually low energy state that it 'wants' to maintain."
            },
            {
                type: "Fill in the Blank",
                q: "To force benzene to undergo an electrophilic aromatic substitution with chlorine (Cl₂), a Lewis acid ________ such as FeCl₃ is required.",
                options: ["Aromaticity", "Addition", "Catalyst", "Nucleophile", "Pi (π)"],
                a: "Catalyst",
                exp: "The catalyst generates the powerful 'Cl⁺' electrophile needed to overcome the stability of the benzene ring."
            },
            {
                type: "Fill in the Blank",
                q: "During an addition reaction across a carbon-carbon double bond, the weaker ________ bond is broken to form two new stronger sigma bonds.",
                options: ["Aromaticity", "Addition", "Catalyst", "Nucleophile", "Pi (π)"],
                a: "Pi (π)",
                exp: "The pi bond is formed by the side-by-side overlap of p-orbitals, which is a weaker interaction than the head-on overlap of a sigma bond."
            },
            {
                type: "Fill in the Blank",
                q: "In alkyl halides, a substitution reaction can occur when an electron-rich species, called a ________, attacks the partially positive carbon atom.",
                options: ["Aromaticity", "Addition", "Catalyst", "Nucleophile", "Pi (π)"],
                a: "Nucleophile",
                exp: "A nucleophile ('nucleus-loving') seeks out the positive center created by the electronegative halogen, kicking the halogen out and substituting itself."
            },

            // --- Matching (16-20) ---
            {
                type: "Matching",
                q: "Match the description to the correct term: \nA reaction that replaces an atom or group without permanently breaking any pi bonds in a ring.",
                options: ["Substitution Reaction", "Addition Reaction", "Delocalized Pi System", "Bromine Test (Br₂)", "Lewis Acid"],
                a: "Substitution Reaction",
                exp: "Substitution allows aromatic rings to react with electrophiles while retaining their stable, alternating double bond structure."
            },
            {
                type: "Matching",
                q: "Match the description to the correct term: \nA reaction that combines two molecules into one by breaking a pi bond.",
                options: ["Substitution Reaction", "Addition Reaction", "Delocalized Pi System", "Bromine Test (Br₂)", "Lewis Acid"],
                a: "Addition Reaction",
                exp: "This is the primary reaction pathway for isolated alkenes and alkynes, turning them into saturated compounds."
            },
            {
                type: "Matching",
                q: "Match the description to the correct term: \nThe structural feature responsible for benzene's unusual stability and preference for substitution.",
                options: ["Substitution Reaction", "Addition Reaction", "Delocalized Pi System", "Bromine Test (Br₂)", "Lewis Acid"],
                a: "Delocalized Pi System",
                exp: "The overlapping p-orbitals create a continuous 'donut' of electron density above and below the ring, granting aromatic stability."
            },
            {
                type: "Matching",
                q: "Match the description to the correct term: \nA reagent used visually to differentiate between an alkene (which rapidly decolorizes it) and an alkane or benzene.",
                options: ["Substitution Reaction", "Addition Reaction", "Delocalized Pi System", "Bromine Test (Br₂)", "Lewis Acid"],
                a: "Bromine Test (Br₂)",
                exp: "Because Br₂ is colored, its rapid consumption by an alkene (forming a colorless product) is an instant visual proof of an addition reaction."
            },
            {
                type: "Matching",
                q: "Match the description to the correct term: \nA substance (like FeBr₃ or AlCl₃) required to make halogens electrophilic enough to attack benzene.",
                options: ["Substitution Reaction", "Addition Reaction", "Delocalized Pi System", "Bromine Test (Br₂)", "Lewis Acid"],
                a: "Lewis Acid",
                exp: "Lewis acids accept electron pairs. By interacting with a halogen molecule, they create a highly reactive electrophilic complex necessary for aromatic substitution."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let hasAnswered = false;

        const elQuestionText = document.getElementById('question-text');
        const elOptionsContainer = document.getElementById('options-container');
        const elCurrentQNum = document.getElementById('current-q-num');
        const elTotalQNum = document.getElementById('total-q-num');
        const elProgressBar = document.getElementById('progress-bar');
        const elQuestionType = document.getElementById('question-type');
        const elNextBtn = document.getElementById('next-btn');
        const elFeedbackBox = document.getElementById('feedback-box');
        const elFeedbackIcon = document.getElementById('feedback-icon');
        const elFeedbackTitle = document.getElementById('feedback-title');
        const elFeedbackContentBg = document.getElementById('feedback-content-bg');
        const elFeedbackExplanation = document.getElementById('feedback-explanation');
        const elScoreDisplay = document.getElementById('score-display');
        const elCurrentScore = document.getElementById('current-score');
        const elExtraInstructions = document.getElementById('extra-instructions');
        const elQuizContainer = document.getElementById('quiz-container');
        const elResultContainer = document.getElementById('result-container');
        const elBtnText = document.getElementById('btn-text');

        function initQuiz() {
            elTotalQNum.textContent = quizData.length;
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            const q = quizData[currentIdx];

            elCurrentQNum.textContent = currentIdx + 1;
            elProgressBar.style.width = `${((currentIdx) / quizData.length) * 100}%`;
            elQuestionType.textContent = q.type;
            elQuestionText.innerText = q.q;

            if (q.type === "Fill in the Blank") {
                elExtraInstructions.innerHTML = "<strong class='text-sky-800'><i class='fa-solid fa-layer-group mr-2'></i> Word Bank:</strong> Aromaticity, Addition, Catalyst, Nucleophile, Pi (π)";
                elExtraInstructions.classList.remove('hidden');
            } else if (q.type === "Matching") {
                elExtraInstructions.innerHTML = "<strong class='text-sky-800'><i class='fa-solid fa-link mr-2'></i> Select the correct match from List B:</strong> Substitution Reaction, Addition Reaction, Delocalized Pi System, Bromine Test (Br₂), Lewis Acid";
                elExtraInstructions.classList.remove('hidden');
            } else {
                elExtraInstructions.classList.add('hidden');
            }

            elFeedbackBox.classList.add('hidden');
            elNextBtn.classList.add('hidden');
            elScoreDisplay.classList.remove('hidden');
            elCurrentScore.textContent = score;

            elOptionsContainer.innerHTML = '';
            q.options.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left bg-white border-2 border-slate-200 rounded-xl p-4 text-slate-700 font-bold hover:border-teal-500 hover:bg-sky-50 flex justify-between items-center";

                const spanText = document.createElement('span');
                spanText.textContent = option;
                btn.appendChild(spanText);

                const iconSpan = document.createElement('span');
                iconSpan.className = "icon-placeholder";
                btn.appendChild(iconSpan);

                btn.onclick = () => checkAnswer(option, btn);
                elOptionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedOption, btnElement) {
            if (hasAnswered) return;
            hasAnswered = true;

            const q = quizData[currentIdx];
            const isCorrect = (selectedOption === q.a);
            const allBtns = elOptionsContainer.querySelectorAll('button');

            allBtns.forEach(btn => {
                btn.disabled = true;
                const btnText = btn.querySelector('span').textContent;
                const iconContainer = btn.querySelector('.icon-placeholder');

                if (btnText === q.a) {
                    btn.classList.remove('border-slate-200', 'hover:border-teal-500', 'hover:bg-sky-50', 'text-slate-700');
                    btn.classList.add('border-green-500', 'bg-green-50', 'text-green-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-check text-green-500 text-2xl"></i>';
                } else if (btnText === selectedOption && !isCorrect) {
                    btn.classList.remove('border-slate-200', 'hover:border-teal-500', 'hover:bg-sky-50', 'text-slate-700');
                    btn.classList.add('border-red-500', 'bg-red-50', 'text-red-800');
                    iconContainer.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500 text-2xl"></i>';
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            elFeedbackBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');

            if (isCorrect) {
                score++;
                elCurrentScore.textContent = score;
                elFeedbackBox.classList.add('bg-green-50', 'border-green-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-shield-check text-green-600"></i>';
                elFeedbackTitle.textContent = "✔️ إجابة صحيحة!";
                elFeedbackTitle.className = "font-extrabold text-xl mb-1 text-green-800";

                elFeedbackContentBg.className = "text-sm leading-relaxed mt-2 p-3 rounded-lg bg-green-100 text-green-900";
                elFeedbackExplanation.innerHTML = `<strong>التوضيح العلمي:</strong> ${q.exp}`;
            } else {
                elFeedbackBox.classList.add('bg-red-50', 'border-red-200');
                elFeedbackIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-600"></i>';
                elFeedbackTitle.textContent = "❌ إجابة خاطئة";
                elFeedbackTitle.className = "font-extrabold text-xl mb-1 text-red-800";

                elFeedbackContentBg.className = "text-sm leading-relaxed mt-2 p-4 rounded-lg bg-red-100 text-red-900 border border-red-200";
                elFeedbackExplanation.innerHTML = `
                    <div class="mb-3 border-b border-red-200 pb-2">
                        لقد اخترت: <span class="line-through opacity-75">${selectedOption}</span><br>
                        الخيار الصحيح هو: <strong class="bg-white px-2 py-1 rounded text-red-700 shadow-sm ml-1 inline-block mt-1">${q.a}</strong>
                    </div>
                    <strong>لماذا الخيار الصحيح أفضل؟</strong><br> ${q.exp}
                `;
            }

            if (currentIdx === quizData.length - 1) {
                elBtnText.textContent = "عرض النتيجة النهائية";
                elNextBtn.classList.add('px-8', 'py-3', 'text-lg');
            } else {
                elBtnText.textContent = "التالي";
            }
            elNextBtn.classList.remove('hidden');
        }

        function nextQuestion() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            elProgressBar.style.width = `100%`;
            elQuizContainer.classList.add('hidden');
            elResultContainer.classList.remove('hidden');

            document.getElementById('final-score').textContent = score;

            const msgEl = document.getElementById('result-message');
            if (score >= 18) {
                msgEl.textContent = "أداء استثنائي وممتاز! 🌟 قدرتك على التمييز بين الإضافة والاستبدال دقيقة جداً.";
            } else if (score >= 13) {
                msgEl.textContent = "مستوى متقدم وجميل! 👏 بقليل من المراجعة لحالات البنزين المحفزة ستكون محترفاً.";
            } else {
                msgEl.textContent = "مقارنة التفاعلات تحتاج إلى إدراك لهياكل الروابط. راجع التفسيرات بتأني وأعد التجربة! 💡";
            }
        }

        function restartQuiz() {
            currentIdx = 0;
            score = 0;
            elResultContainer.classList.add('hidden');
            elQuizContainer.classList.remove('hidden');
            elNextBtn.classList.remove('px-8', 'py-3', 'text-lg');
            loadQuestion();
        }

        // Start Quiz
        initQuiz();

    </script>
</body>

</html>
